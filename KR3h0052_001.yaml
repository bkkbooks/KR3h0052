  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0052_WYG_001-1a, image: WYG0816/WYG0816-0339c.png}
body:
  text: 書法離鈎卷一明潘之淙撰原流伏羲觀象於天取法於地作八卦而字畫萌倉頡仰觀奎星圓曲俯察鳥迹龜文窮天地之變泄造化之機而文字立至周設官分職乃立保氏掌養國子教之六藝六藝之五有曰六書而書法乃大備六書者一象形二指事三㑹意四諧聲五假借六轉注也肇於象形滋於指事廣於㑹意備於諧聲四書不足然後假借以通其聲聲有不合則又轉注以演其聲象形加義於指事㑹意生聲於諧聲假借叶聲於轉注此六書之本末也既明六書文字當識子母相生倉史主母而役子率子以從母主類為母從類為子用者為母不用者為子得勢為母不得勢為子母主形義子只主聲總而為言則象形指事之謂文因而滋蔓子母相生㑹意諧聲之謂字孳乳浸多著於竹帛之謂書科斗謂之古文周史籕作大篆篆者傳也傳其書也與古文小異名曰籕文秦有小篆損於籕文有八分損於小篆有隸書通於楷書漢史游急就解散於隸書蔡雍飛白變楷以題署章草乃隸書之捷行書乃真書之省草書又章草之捷也六書十體如是四聲五音繫之故曰三倉制字而後知義類有周爾雅而後知訓詁秦漢定體而後知書文許慎說文而後知偏旁孫炎作音而後知聲韵其他辨論品隲代不乏人是在究心者參之六義象形者象其物形隨體詰詘而畫其迹也如日字從口從一陽數月字從月從二隂數田字象四口十阡陌之制草字象物初出有枝莖之類是也指事者直著其事加物於象形之文指而可識也如木象形之文加一於下則指為本加一於上則指為末人在一上為上人在一下為下之類是也其字既不可謂象形又不可謂㑹意故謂之指事㑹意者比類合義以見指撝或合體而兼義或反文而取意象形指事文也諧聲字也㑹意文字之間也如止戈為武人言為信草生田上為苗鼠居穴下為竄之類是也諧聲者主母以定形因母以主意而附他字為子以調合其聲也如江河左從水以定其體而諧聲在右鵝鴨右從鳥以定其體而諧聲在左裙裳諧聲在上簾箔諧聲在下園圃諧聲在內徽輿諧聲在外之類是也假借者無義之義本非己有因他所授也因義而借者初本裁衣之初借為凡物之初狀本犬形之狀借為凡物之狀無義出借者易本蜥易之易借為變易之易財本貨財之財借為財成之財因借而借者商木商度既借為宫商之商又借為商賈之商之本之草既借為之往之之又借為語詞之之是也轉注者展轉其聲注釋其字而後知也有義轉注者惡本善惡惡則可惡故轉為憎惡之惡齊本齊一齊則如齊故轉為齊莊之齊無義轉借者荷本蓮荷轉為負荷之荷雅本烏雅轉為風雅之雅因轉而轉者長本短長長則物莫先焉故轉為長幼之長長則有餘故又轉為長物之長行本行止行則有踪跡故轉為德行之行行則有次序故又轉為行列之行是也四學眺氏云文字之學有三其一體制曰㸃畫縱橫也其二訓詁曰稱謂古今雅俗也其三音韵曰清濁髙下也殆後篆隸變而行楷興復有論格勢諸書是謂四學論體制者許慎說文吕忱字林李陽氷刋定徐鉉集注徐鍇繫傳王安石字說夢英公字源張有復古編鄭樵六書略戴侗六書考楊桓六書統倪鏗類釋許謙假偕論周伯琦正訛趙古則本義皆是也論訓詁者周公爾雅劉熙釋名揚雄方言曹憲博雅張楫廣雅陸德明釋文陸佃新義顧野王玉篇朱子十三經注疏皆是也論音韵者漢史正義云魏祕書孫炎始作反音眺氏謂齊梁間西域之法始則沈約四聲韵陸法言廣韵吕靜韵集夏侯該楊休之杜素卿周思言李奉節僧鍳聿韵總僧守溫字母夏竦四聲吳棫補韵及韵略韵海韵經韵㑹皆是也論格勢者蔡雍筆勢論衛夫人筆陳圖右軍筆法論衛恆四體索靖書勢李陽氷翰林禁經張懷瓘書斷郭忠恕法書苑許歸歟墨藪張彥逺法書要録蔡專法書撮要黃伯思法帖刋誤米元章書史及諸家法帖譜系翰墨志記評訣考議皆是也證非趙氏云言之於語論寸之於寺專謂之因母以主意口于非切之於園國晶之於曑􅀢謂之主母以定形班孟堅衛巨山謂諧聲為形聲非其義也自說文以同意相受老考為轉注依聲託事令長為假借鄭𤣥以之解經鄭樵以之成略遂失本旨惟蕭楚云一字轉其聲而讀之為轉注程端禮云轉注為轉聲假借為假聲是也老字從人從毛從匕音化者人毛匕而白為老㑹意字也考者老也從老省定意從丂苦浩切者諧聲字也非以老字轉為考也如耆耉者耋孝皆從老省以為意旨句占至為聲孝則子承老為㑹意鄭氏出入轉注非也以日月成易轉為明以目少作眇轉為省至葛稚川加彡於景作影王逸少從車於􅂒陳為陳又日莫之莫加日烏雅之雅作鴉然火之然加火為燃州渚之州加水為洲果字有草須字有髟奚論丁􅀢不用口車渠不用石哉是不明假借之旨也如獻亨俗作享亨飪俗作烹亨通而異匕箸俗作筯箸見俗作著依箸俗作著而殊者亦昧於轉注諧聲也述傳古書邈矣所謂伏羲因龍瑞作龍書神農因嘉禾作穗書少昊鳯鸞之文顓頊科斗之篆堯因軒轅之圖而作龜書禹箸鐘鼎之文又作螺書務光倒薤史佚虎書此傳疑也其孔壁經傳汲冢周書列國欵識鼎彜石銘之類此傳信也漢志秦書八體一曰大篆史籕作也二曰小篆李斯作也三曰刻符竹符合而中分字形也四曰摹印屈曲縝密秦璽文也五曰蟲書鳥形施幡信也六曰署書題宫闕也七曰殳書題戈㦸也八曰隸書程邈作也漢興草書尉律漢律篇名又以李斯倉頡篇胡母敬博學篇并名倉頡書司馬相如作凡將篇史遊作急就篇大匠李長作元尚篇楊雄作訓纂篇杜林訓之班固續之王莽使甄豐定六書一曰古文孔壁書也二曰竒字籕文也三曰篆書小篆也四曰佐書隸書也五曰繆書摹印也六曰鳥書蟲書也光武時馬援疏論和帝命賈逵修文許慎訪逵說文隋志亦云後漢鐫蔡雍書七經於石碑又云魏世行八分其訓義有史籕倉頡三倉埤倉廣雅諸篇蕭子良古今篆籕文體又有藁書楷書蓬書填書奠書龜書雁書􅢰波飛白懸針垂露倒薤芝英金䥘仙人虎爪寉頭象形蛟腳科斗鳯鳥龍虎麒麟尚方大篆十二時書三十餘種皆出於六文八體因事而生變也古文秦火滅經除典古文絶矣漢文時博士伏勝獻古文尚書魏文時樂人竇公年一百八十歲獻古文樂書武帝時魯共王壞孔子宅壁中得古文尚書禮記春秋論語孝經北平張蒼獻左傳宣帝時河內女子壞老子壁得古文二篇晉熙寧一作咸寧五年汲郡人發魏襄王一竹安釐王冢得册書千餘萬言又云冢書石銘人無識者叔孫通云科斗文也學古編云科斗為字之祖象蝦蟆子形上古無筆墨以竹挺㸃漆書竹簡上竹剛漆膩畫不行故首重腹圓尾輕似其形耳大篆籕文竒字周宣王太史籕變科斗箸大篆十五篇漢藝文志云凡九千字趙髙以教胡亥說文云秦學僮試諷籕書又云與古文或異又云孔子六經左傳皆以古文又云竒字即古文而異者則籕文也其迹石鼓文存焉字源云漢元帝王遵嚴延年竝工史籕秦焚書惟易與史籀得全吕氏春秋云倉頡大篆非也學古編云欵識文者列國之文薛尚功集古鐘鼎文為五聲韻李斯既作小篆遂以籕文為大篆篆法匾者佳謂之􅝻音蝸書譜訛為後人以蜾字代之益非匾徐鉉曰石鼓文是也小篆小篆秦篆也丞相李斯作倉頡篇七章郎中令趙髙作爰歷篇六章太史令胡母敬作博學篇七章皆損益大篆也始皇并六國罷不合秦文者其畫如鐡石勢若飛動隸楷之祖銘題鐘鼎符節至今用焉學古編云漢篆變古法許氏作說文以救其失也兼考通釋復古篇得矣舒元輿云秦相變倉籕為玉箸篆成一家之法歷漢至隋八姓無出其右唐李陽氷宗之八分八分秦羽人上谷王次仲作也序仙記云次仲少有異志變倉頡書為八分蕭子良云靈帝時王次仲飾隸為八分蔡雍云次仲初變古形非效程邈隸也小篆古形猶存其半八分又減小篆之半蔡琰云吾父割隸字八分取二分割篆字二分取八分隋志云魏世有八分書王愔云建初中以隸字作楷法字方八分言有模楷法書苑云八體之後又分此法隸書隸書秦下邽人程邈作也初為獄吏得罪始皇入雲陽獄中覃思十年易大小篆方圓為隸書三千字奏之始皇用為御史以奏事煩多為隸人佐書趨省易也八分乃小篆之捷隸又八分之捷也秦隸近欵識篆即秦權量上刻字未有挑法也漢隸蔡雍石經諸碑皆有挑法矣宣和書譜云後人發臨淄冢得齊太公六世孫胡公棺有字同今隸胡公先始皇四百餘年豈與篆籕相生特未行世邈以此解雲陽之難耳飛白飛白後漢右中郎蔡雍作也王僧䖍云靈帝熹平中蔡雍作聖皇篇待詔鴻都門見役人方修飾以堊帚成字心恱而歸為飛白衛恆祖述飛白而造散隸開張隸體微露其白瀟灑於隸書揚采於飛白梁武帝謂王獻之書白而不飛蕭子雲書飛而不白宜斟酌得衷後子雲以篆為之雅合帝意雖創法於八分實窮微於小篆後歐陽詢得焉王愔云體勢徑大字輕微不滿變楷制以題署書指云飛白是分隸間入以行草而筆勢輕淡者漢魏署榜多用之蓋字形既大患在填實故使透漏見素地耳東坡飛白贊云微微乎若輕雲之蔽月翻翻乎若長空之卷斾猗猗乎若游絲之縈栁絮裊裊乎若流水之舞荇𢃄離離乎其逺而相屬縮縮乎其近而不迫楷書楷書真書也蔡雍云隸減八分之半而通於楷楷者法也式也模也時人用寫篇章法令亦謂之章程梁鵠云鍾繇善章程姜堯章云真書以平正為善此世俗之論唐人之失也真書無出鍾元常其次王逸少二家瀟灑何拘平正唐人以書取士故有科舉習氣顔魯公干祿書是也歐虞顔栁前後相望故下筆應規入矩無復魏晉飄逸之風矣張懷瓘書斷云後漢王次仲為上谷太守楷隸初制大範幾同故後人惑之按次仲秦人作八分合蔡雍蕭子諸說懷瓘誤矣或云次仲作八分即今之古隸程邈作正隸即今之楷書至東漢漸至訛異蔡雍作石經正之而書指亦以程邈正隸為楷且古人書譜無專舉正楷為言者此說近是行書行書後漢穎川劉德升作也即真書之少縱以從簡易相間流行鍾繇善行押書是也張懷瓘書斷云非草非真離方遁圓兼真者謂之行楷𢃄草者謂之行草獻之白父云古之章草未能宏逸頓異真體合窮揮運之理極草縱之致不若行草之間也姜堯章云魏晉行書自有一體右軍蘭亭記及諸帖第一謝安石大令諸帖次之所貴穠纎間出血脈相連斤骨老健風神灑落急就章草章草漢元帝時黃門令史游作急就凡三十二章雜記姓名諸侯五官以教童蒙緩急可就而求之謂解散隸體粗略書之漢書簡墮漸以行之是也唐顔師古為之注後漢北海劉穆始善建初中杜度善章草帝詔使草書上事魏文亦使劉廣通上事蓋因章奏用之謂之章草章草乃隸楷之捷草書又章草之捷也訣云章草草其隸字八分謹嚴如真用其一躍二波也草書徐鍇云按書傳多云張竝作草又云齊相杜深作說文云漢興有草書則張竝之前有矣衛恆云杜度善草書崔瑗崔實父子繼能杜氏結字甚安而書體微瘦崔氏甚得筆勢而結字小疏𢎞農張芝因而變之轉精其妙一筆而成偶有不連而血衇不斷及其連者氣候通於隔行故王子敬行首之字往往繼前行之末世稱一筆書自伯英始也衛瓘索靖俱尚書郎善草時稱一臺二妙瓘得伯英斤靖得伯英骨懷素工瘦張顛工肥瘦硬易得肥徑難工皆草聖也書法離鈎卷一
