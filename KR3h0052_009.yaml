body:
  text: 書法離鈎卷九明潘之淙撰法帖古籕篆石鼓文古文尚書古文孝經延陵季子碑泰山碑望山碑嶧山碑倉頡十五篇詛楚文碧落碑新泉銘張平子碑許慎說文徐鍇通釋六書考石經遺字碑薛尚功欵識法帖薛尚功重廣鐘鼎韻王梵鐘鼎韻張有復古編又五聲韻譜林罕偏旁小說髙氏五聲韻總夏竦古文四聲韻翟耆年籀史續千文泉志隸書漢隸字源碑本隸韻佐書韻編蔡雍石經碑洪適隸韻洪適隸釋嘯堂集古録真書鍾繇力命剋捷宣示右軍樂毅畫讚黃庭霜寒大令洛神賦六朝曹娥遺教羊叔子碑智永千字文虞世南孔子廟碑張旭郎官陶𢎞景瘞寉舊館壇歐陽詢九成宫化度寺虞恭公皇甫碑栁公權陀羅尼褚遂良哀册聖教顔真卿麻姑壇放生池中興頌干祿字東方贊行書鍾繇丙舍吳人羸頓雪寒長風逸少蘭亭開元寺又官奴來禽諸帖並見淳化大令地黃鵝羣諸帖並見淳化謝安八月五日褚河南枯樹賦星霜李雍嶽麓娑羅樹雲麾東林寺張從申𤣥靜先生碑懷仁聖教序草書張芝知汝諸帖右軍十七諸帖大令委曲諸帖竝見淳化張旭千文懷素自叙千文聖母藏真淳化閣帖為諸帖之祖絳帖淳化之子潭帖淳化之子太清樓帖淳化之弟戲魚堂帖祕閣續帖黔江帖東庫本鼎帖賜書堂帖蔡州帖彭州帖汝州帖泉州帖修內司帖利州本甲秀堂帖星鳳樓帖寶晉齊帖玉麟堂帖二王帖羣玉堂帖百一帖近世雜刻種種去古愈逺兹不具載原筆劉熙云筆者述也述其事書之上古用竹簡刀錐畫之或用漆以竹挺子書之詩曰貽我彤管禮曰史載筆說文曰楚曰聿吳曰不律燕曰弗秦曰筆蒙恬始用兔亳為筆毛穎傳云穎中山人蒙恬載以歸始皇封諸管城號管城子纍拜中書令呼中書君書指云筆管欲細欲輕毫不欲太剛亦不欲太弱古人以象管為筆重而不適竹管兔毫者為佳取圓熟而健若狸毫者峭而不圓未善也江淹夢筆生花而文章益進王珣夢人授筆如椽而草武帝哀册諡議筆洵有靈母以毛錐薄之也藏筆須用黃連輕粉明礬漬尖且塞管孔然亦一年而止不可太久久則毫宿而易斷也原墨劉氏云墨者畫也畫其迹以為則也上古以漆畫字未嘗有墨毛穎傳云與絳人陳𤣥𢎞農陶𢎞㑹稽楮先生友善出處必偕坡仙云世人論墨多貴其黑而不取其光光而不黑固為棄物若黑而不光索然無神采亦復無用要使其光清而不浮湛湛如小兒目睛乃為佳也又云王晉卿遺墨用黃金丹砂墨成價與金等三衢蔡瑫自煙煤膠外一物不用特以和劑有法甚黑而光殆不減晉卿胡人謂犀黑暗象白暗可以名墨亦可以名茶墨膠以鹿角者為妙然最要椎鍊堅好磨之其光可以照人而四旁可截紙乃貴耳墨舊而膠氣盡者必少光采世重舊墨取其入藥耳若作書畫太舊則煙浮而不光須十年上下者為妙原研劉氏云研者堅也研也太公曰石研孔箸其用久矣唐皆鳳池研中心如瓦凹故曰研瓦援筆因勢凹則鋒圓書畫亦圓今研如砥援筆則鋒多偏近有𨫼心凸研援筆則三角矣坡翁云建州北苑鳳凰山山如飛鳳下舞之狀山下有石聲如銅鐡作研至美如有膚筠然此殆玉德也疑其太滑然至益墨余名之曰鳳咮又云僕好用鳳咮石研然論者多異同蓋自少得真者為黯黯灘石所亂耳淄石號韞玉研發墨而損筆端石非下嵓者宜筆而褪墨二者當安所去取用褪墨研如騎鈍馬數步一鞭數字一磨不如騎騾用瓦研也端溪石出肇慶府端溪下嵓舊坑卵石色黑如漆細潤如玉有眼眼中有暈六七眼相連排星斗象此嵓慶歷間坑已竭又有一種卵石去臕方得材色青黑細潤如玉有青花如箸頭大似碧石青瀅或有白㸃如粟排星斗象水濕方見皆扣之無聲磨墨亦無聲此二種石最貴下嵓止有一坑出此二種石其色未嘗紫也别無新坑端溪中嵓舊坑亦卵石也色紫如嫩肝細潤如玉有眼小如菉豆或有緑條文或有白條文堅而圓者為眼橫而長者為條扣之無聲磨墨亦無聲此種石亦貴外有青臕色久用鋒鏌不退北宋時坑已取竭中嵓新坑石色淡紫眼如鸜鵒眼中有暈嫩者扣之無聲磨墨微有聲端溪上嵓舊坑新坑石皆灰色紫而粗燥眼如雞眼大扣之磨墨皆有聲久用光如鏡面舊坑稍勝新坑惟端溪有眼古云無眼不成端其眼有活眼淚眼死眼活眼勝淚眼淚眼勝死眼又云眼多石中有病辰沅州出一種石色深黑質粗燥或有小眼端溪人取歸刻作端樣稱為黑端辰沅人自製者多作犀牛八角等樣又有一種􅤰石出九溪􅤰溪表淡青內深紫而帶紅有極細潤者久用則光如鏡面或有金線及黃脈相間者號為紫袍金帶歙溪石出歙縣龍尾溪舊坑卵石色淡青黑有細紋潤如玉水濕微紫或隱隱有白紋成山水星月異象燥則否大者不過四五寸多作月研就其材也或有純黑者此石最貴不減端溪下嵓南唐時方開至宋時盡矣龍尾溪新坑石色亦有青者質粗燥有極大者盈二三尺金星舊坑新坑石淡青色竝粗燥大者盈尺銀星舊坑新坑石色淡青黑竝粗燥有星處不堪磨墨多側取為研大者盈尺萬州懸岩金星石質亞端溪下嵓色漆黑細潤如玉水濕金星則現乾則否極發墨洮河緑石色緑如藍潤如玉發墨不減端溪下嵓出臨洮大河深水底甚難得今有緑石研名洮石者多是􅤰石之表或是長沙山石也􅤰石光而潤亦不受墨銅雀研乃銅雀臺瓦入水多年故滋潤發墨世多僞者未央研乃未央宫瓦亦注水經久好事者以為研原紙劉氏云紙者砥也平滑如砥上古竹簡韋編漢蔡倫字敬仲用樹膚敝布魚網為之故從巾一從糸氏聲坡翁云成都浣花溪水清勝常以漚麻楮作箋紙堅白可愛數十里外便不堪造信水之力也揚州有蜀岡岡上有大明寺井知味者謂與蜀水相似西至六合岡盡而水發合為大溪溪左右居人亦造紙與蜀産不甚相逺自十年以來所造益多工亦益精更數十年當與蜀紙相亂也北紙用橫簾造紋必橫其質鬆而厚南紙用豎簾紋豎故二王真迹多是㑹稽豎紋竹紙唐有麻紙其質厚有硬黃紙其質如漿潤澤瀅滑用以書經故善書者多取作字五代有澄心堂紙宋有觀音紙匹紙長三丈有彩色粉箋其質光滑蘇黃多用是作字元亦有彩色粉箋有蠟箋彩色花箋羅紋箋皆出紹興有白籙紙清江紙觀音紙出江西趙松雪巙子山張伯雨鮮于樞多用此紙有倭紙出倭國以𧖟繭為之細白光滑之甚或云倭國無𧖟亦樹膚也紙取無灰者為妙然愈舊愈佳堅滑則勝鬆澀則惡書法離鈎卷九
