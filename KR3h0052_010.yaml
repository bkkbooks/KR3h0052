front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0052_WYG_010-1a, image: WYG0816/WYG0816-0399a.png}
body:
  text: 書法離鈎卷十明潘之淙撰切韻三十六字母切韻法見溪羣疑是牙音經堅見輕電切輕牽溪牽奚切勤虔羣瞿云切銀言疑魚其切端透定泥舌頭音丁偵端多官切汀天透他候切廷田定徒徑切年泥年題切知徹澄娘舌上音珍邅知珍離切振延徹敕列切陳纒澄時陵切紉􅀈娘女良切幫滂並明重唇音賓邊幫博旁切繽偏滂普郎切頻蠙並部迥切民綿明睂兵切非敷奉微輕唇音分蕃非匪微切芬番敷芳蕪切墳煩奉父勇切文樠微無非切精清從心斜齒頭音津煎精子盈切親千清七精切秦錢從墻容切新仙心思尋切餳涎斜徐嗟切照穿牀審禪正齒音征氊照之笑切嗔昌穿昌緣切榛潺牀仕莊切身氊審式荏切辰常禪時連切影曉匣喻是喉音殷焉影於鐃切馨祅曉興鳥切礥賢匣轄甲切勻緣喻俞戍切來日半舌半齒音鄰連來郎才切仁然日入質切切韻內字音釋樠武官切木名祅馨煙切從示從天胡神紉尼鄰切索之也􅀈女聯切呐平聲有聲無字借用傎音顛倒也礥下珍切難也太玄經有礥首侲癡鄰切欲仆也延抽延切徹平聲廣韻安步延延切韻六十八字訣因煙寅延人然神禪新鮮餳涎興掀兄喧刑賢迎妍營員零連寧年清千秦前精箋賓邊平便娉便經堅輕牽擎虔真氊稱燀澄纒聲羶丁顛汀天亭田民眠肱官轟歡分番文樠早梅詩切字例舊字母三十有六犯重者十六似有惑焉此篇以早梅詩一首凡二十字為字母標題於上即各韻平聲字為子叶調於下得一字之平聲其上去入三聲字一以貫之矣其間東早梅暖一枝無人見來十字呼之其氣內而不出若風破向開氷雪春從天上十字呼之其氣皆出口此音有出入之異而兩分之東丁顛風分番破平偏早精箋梅民綿向欣軒暖寧年一因煙枝真占開輕牽氷賓邊雪新先無文樠人仁然見京堅春澄纏從清千天亭田上神禪來零連假如用陽字韻以東字為母以江字為子曰東江切即叶之曰東丁顛當乃是當字仍以當字平上去入調之當黨蕩鐸四字全矣又以風字為母以陽字為子曰風陽切即叶之曰風分番房乃是房字仍以房字調之為房倣放縛四字矣又以破字為母以陽字為子曰破陽切即叶之曰破平偏旁乃是旁字仍以旁字調之為旁膀胖粕四字矣餘皆凖此好雨詩切字例好許老切許興掀好雨王矩切王寅延雨知珍離切珍真氊知時辰之切辰神禪時節子結切子精箋節當都良切都丁顛當春樞倫切樞稱燀春乃曩采切曩寧年乃發方越切方兄喧發生師庚切師聲羶生隨旬為切旬餳涎隨風方中切方兄喧風潛慈鹽切慈秦前潛入日執切日人然入夜寅謝切寅盈延夜潤儒順切儒人然潤物文拂切文營貟物細思計切思新鮮細無微虞切微文樠無聲書征切書伸羶聲野以者切以寅延野徑吉定切吉經堅徑雲於羣切於寅延雲俱恭於切恭經堅俱黑迄得切迄興掀黑江均雙切均經堅江船食緣切食神禪船火虎果切虎轟掀火獨徒各切徒亭田獨明睂兵切睂民眠明曉興杳切興欣掀曉看丘寒切丘輕牽看經堅丁切堅巾軍經濕失入切失聲羶濕處昌據切昌稱燀處花呼瓜切呼轟歡花重儲用切儲澄纏重錦居飲切居經堅錦宫居中切居經堅宫城時征切時澄纒城右杜詩亦切韻法以上一字定何音下一字定何韻中間二字乃轉音而得之也如好為許老切則許乃撮唇音轉興掀二字而得老字下皆倣此總之不出前六十八字轉求餘韻可以意會矣辨聲音要訣切韻先須辨四聲五音六律並兼行難呼語氣皆名濁易紐言詞盡屬清唇上碧班邠豹剝舌頭當滴帝都丁撮唇呼虎烏塢汚捲舌伊幽乙意英閉唇披頗潘坡拍齊齒之時實始成正齒止征真志只穿牙拆摘塞箏笙齒唇分敷方奉復鼻唇工貢故官肱引喉勾狗鷗鴉厄隨鼻蒿毫好赫亨上鄂囂妖嬌矯轎平牙臻櫛怎詵生縱唇休朽求鳩九送氣查拏詫宅根含口甘含鹹檻呷口開何可我歌羮大抵宫商角徵羽應須紐弄最為精世間義理皆如此自是人心不解明辨五音訣欲知宫舌居中喉音欲知商口開張齒頭正齒音欲知角舌縮却牙音欲知徵舌挂齒舌頭舌上欲知羽撮口聚唇重唇輕四聲三聲例東洪江陽真文山寒端桓先全庚晴侵尋緘咸廉纎已上四聲如東董凍篤是也支辭西微居魚呼模皆來蕭豪戈何家麻遮蛇幽樓已上三聲如支紙置是也書法離鈎卷十
