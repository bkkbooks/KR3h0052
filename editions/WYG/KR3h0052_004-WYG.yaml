front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0052_WYG_004-1a, image: WYG0816/WYG0816-0358a.png}
body:
  text: 書法離鈎卷四明潘之淙撰體式衛夫人云用筆六種結搆圓備如篆法凶險可畏如八分鬱拔縱横如古隸窈窕出入如飛白飄揚灑落如章艸耿介特立如鶴頂然心有委曲每爲一字各象其形孫過庭云眞以㸃畫爲形質使轉爲性情艸以㸃畫爲性情使轉爲形質艸乖使轉不能成字眞虧㸃畫猶可記文囘互雖殊文體相涉旁通二篆俯貫八分包括章艸涵泳飛白毫釐不别胡越殊風書譜云鍾繇隸竒張芝艸聖專精一體以致絶倫伯英不眞㸃畫狼藉元常不艸使轉縱横形狀蔡中郎云爲書之體須入其形若坐若立若動若飛若徃若來若卧若起若愁若憂若蟲食木葉若利劍長戈若短弩勁矢若水火若雲霧若日月縱横有象矣鍾繇云筆迹者界也流美者人也萬類象之㸃如山頽摘如雨線纎如絲毫輕如雲霧去如鳴鳳遊雲漢來如游女入花林書評云王逸少隸飄若游雲矯若驚龍唐徐浩艸隸如怒猊抉石渴驥奔泉張旭艸書如驚蛇入艸飛鳥出林姜堯章云折釵股者欲其屈折圓而有力屋漏痕者無起止之迹錐畫沙者匀而藏鋒壁坼路者欲其無布置之巧祝京兆云長者如秀整之士短者如精悍之徒瘦者如山澤之癯肥者如貴游之子勁者如武夫媚者如美女敧斜如醉僊端雅如賢士氣勢蔡邕云勢來不可止勢去不可遏惟筆軟則竒怪生焉蔡希綜云屈折之狀如鋼鐵爲鈎牽掣之蹤若勁鍼直下主客勝負皆須姑息先作者主也後爲者客也必舉止合則起伏相承訣云彩色字之神也神馭氣氣馭形形全骨肉肉全神色孫過庭云或恬澹雍容内含觔骨或折剉槎枿外耀鋒芒坡僊云吾醉後輒作艸書十數行覺酒氣拂拂從十指間出也布置訣云長短濶狹字之態度㸃畫斜曲字之映對先主後賓卑奉尊接審其疏密取其停匀空則補就孤則扶持以下承上以右應左以大包小以少附多蔡邕云落筆結字上皆覆下下皆承上使其形勢遞相映帶無使相背歐陽詢云不可頭輕尾重無令左短右長斜正如人上稱下載姜堯章云疏欲風神密欲蒼老如佳之四横川之三直魚之四㸃畫之九畫須下筆勁凈疏密得均當疏不疏反成寒乞當密不密必致凋疏書法三昧云如中字孤單則居中龍字相竝則分左右爲二停衝字則分左右中爲三停雲字則分上下爲二停素字則分上下中爲三停凡四方八面㸃畫皆拱中心左短者齊上右短者齊下重畫上仰下覆重捺上留下放重字上小下大左促右展纂要云位置大停又唐人經生之弊絶無位置終不成書運用三昧云一㸃一畫之間三過其筆一㸃㣲如粟米亦分二過一字有一字之起止朝揖顧盼一行有一行之首尾接下承上郭若虛云氣韻本乎運心神采生於用筆夫畫有三病一曰版者腕弱筆癡全虧取與物狀平褊不能圓混也二曰刻者運筆中疑心手相度鉤畫之際妄生圭􅊁也三曰結者欲行不行當散不散似物凝滯不能流暢也東坡云大字難於結密而無間小字難於寛綽而有餘眞書難於飄揚艸書難於嚴重又云作字要手熟則神氣完實而有餘韻書指云書貴質不貴工貴澹不貴豔貴自然不貴作意質非鄙俗之謂也清廟明堂大雅斯在是已澹非浮易之謂也太羮𤣥酒至味存焉是已自然非信手放意之謂也不事追琢神氣渾全險易同塗繁簡一致是已肥瘠衛夫人云善筆力者多骨不善筆力者多肉多骨㣲肉者謂之觔書多肉㣲骨者謂之墨猪梁武帝云純骨無媚純肉無力少墨浮澁多墨笨鈍虞永興云側管則鈍慢多肉直鋒則乾枯露骨比其悟也麤而不鈍細而能壯長而不爲有餘短而不爲不足歐陽詢云不可瘦瘦則形枯不可肥肥則質濁張懷瓘云馬以觔多肉少爲上肉多觔少爲下書亦如之必骨肉相稱神貌洽然若觔骨不任其脂肉在馬為駑駘在人爲肉疾在書爲墨猪準其病狀未即已也惟題署及八分肥密可也徐浩云觔骨不立脂肉何附筆須藏鋒不然有病鷹隼乏彩翰飛戾天骨勁而氣猛也翬翟備色翩翩百步肉豐而力沉也華彩髙翔則書之鳳凰矣黄魯直云肥不露肉瘦不露骨訣云書以骨爲體以主其内以肉爲用以彰其外氣宜清色宜溫骨宜豐肉宜潤方圓崔子玉云觀其法象俯仰有儀方不中矩圓不中規抑左揚右望之若敧虞世南云字體質滯為目所視如水在方圓豈由乎水且筆妙喻水方圓喻字所視不同逺近則異變通異訣云方以圓成圓由方得舍方求圓則骨氣莫全舍圓求方則神氣不潤方不變謂之斗圓不變謂之環書之病也張懷瓘云欲方而有䂓圓不失矩亦猶人之指腕促則如指之拳賒則如腕之屈然須裹之以皮肉若露觔骨是乃病也姜䕫云方圓者真艸之體用真欲方艸欲圓方者叅之以圓圓者叅之以方方圓曲直不可顯露直須涵泳一出自然眞多用折艸多用轉方長嚴肅為體圓轉輕健爲用歐顏方正虞永匀圓遲速筆勢論云意在筆前字居心後未作之初結思成矣筆不欲急何也筆為將軍故須持重心不欲遲何也心爲箭鋒遲則中物不入訣云能速而速謂之入神能速不速謂之賞㑹未能速而速謂之狂馳不當遲而遲謂之淹滯狂馳則形勢不全淹滯則骨肉重慢縱横斜直不速而行不止而緩腕不停筆筆不離紙心不速而神氣短筆不遲而神色枯一遲一速剛柔相濟孫過庭云勁速者超逸之機遲留者賞㑹之致將反其速行臻令美之方專溺於遲終爽絶倫之妙能速不速所謂遲留因遲就遲詎名賞㑹非心閒手敏難以兼通焉姜堯章云遲以取妍速以取勁必先能速而後能遲若不能速而專事遲則無神氣若專事速則多失勢勁軟隸訣云方勁古拙挑㧞平硬國史補云艸瘦硬易肥勁難工訣云剛縱其柔柔縱其剛筆勢論取形質快健手腕輕便八法訣云㸃欲堅如鐵勾欲力如銀㸃横無力而不險勾短棘鍼而有力横畫籍於豎趯趯則筆勁澁掠撇法在澁而勁意欲暢而婉啄用輕勁為勝去浮怯重滯磔䟐重鋒緩則勢肥須遒勁而遲澁之艸訣挑法掲欲利按欲輕輕則骨勁重則質鈍故云形圓則潤勢疾則澁以𦂳而勁以險而峻圓則骨不重方則氣不潤遲取妍速取勁墨潤取妍燥取險毫勁有力圓則妍美側管鈍慢多肉直鋒乾枯露骨觀諸説而勁軟辨矣結搆雲空上勾以應下如鳥之視胸九見腕勾以應上須折鋒而起門月右勾應左半斜以鋭爲精來東中勾應中隨縮鋒而㣲露長民左勾應右須盡趯其鋒黍委上下之撇㸃有隂陽之分不分則無上下相承術衝三排之直畫卓然中立而不倚其左右有拱揖之情畺三三排之横畫截然中處而不乖其上下有仰覆之别其目四畫上下反其情二三但取順然無四㸃左右要成八字中帶可就上不可就下皿四直左右上開下合炎茶兩捺一上捺一下捺不宜顛倒反及二撇先長而斜硬後差短而腕轉廬多先腕轉而後斜硬口曰不可横長下畫長承直末臣巨欲直左而右旁短直應之旬匊裏面字與勾齊方稱長馬短畫不可與長直畫相粘衣良捺應左勾須略平起一云勾宜另撘莫矢下畫宜長撇短不轉而㸃取下長短應之思志心在下者欲折右足右寛方稱一云猶嫌挺直均平頁貝右長直畫須作小棘刺中短畫不可相粘欲圓凈匀平而啄短出以㸃承長直畫還逺之遶裏字上大下小方稱雖難直畫㣲向左以避右邉之勢烏鳥屈脚之勢如角弓之張用周初撇首尾向外次弩首尾向右同國初直畫首尾向右平畫仰次直畫首尾向左箋森重勾在先縮鋒而後出鋒作趯以應捺亦同行作左短右長於佳右短左長自因左竪短右勾㣲長亦馬㸃之重併必屈伸以變換之否則如布碁三册畫之重併必屈伸仰覆向背變換之否則如布算㸑薑繁雜者必求古人佳様不可擅寫邊爾太繁者宜减之倉食上面不可寫波上下直畫宜短㸃宜近上是足卜字居中下撇須横而波磔終之又名三牽綰法心初㸃向裏横戈斜平勾向内而収中㸃取髙勢欲粘第三㸃第三㸃須與勾髙不可下風兩邊悉宜圓名曰金剪刀柔下木字左右須齊直者日字不宜正對土字十横畫挍長直畫宜短七横畫挍長直畫轉而復囘和偏少者伸㸃畫以就之氊偏碍者屈畫以避之井字孤單者展一畫以舒之棗字重併者促一畫以斂之畫字九畫須下筆勁凈疏密停匀照映辛字太疏補之作􅉝必古有佳様乃可寫左畫短斜硬其撇右畫長腕轉其撇一字有一字之形勢要在結搆得宜此不過舉前人論議之槩其間錯綜變化惟㑹心者自得之未可執一論也弊病梁武帝云運筆斜則無芒角執筆寛則書緩弱㸃掣短則臃腫㸃掣長則離澌畫細則字横畫麤則形慢拘則乏勢放又少則王右軍云腹不宜促腳不宜賖又不宜斜重不宜長單不宜小復不宜大不宜傷密密則似疴瘵纒身不宜傷疏疏則似溺水之禽不宜傷長長則似死蛇掛樹不宜傷短短則似壓死蝦蟆孫過庭云質直者勁挺不通剛狠者倔彊無潤矜斂者弊於拘束脱易者失於䂓矩温柔者傷於軟緩躁勇者過於剽廹狐疑者溺於澁滯遲重者終於蹇鈍輕瑣者染於俗吏此皆獨行之士偏玩所乖張懷瓘云方圓齊平支體肥鈍布置偪仄稜角相形神氣昬䝉以濃墨爲華書之病也虞安吉云太緩無觔太急無骨歐陽詢云最不可忙忙則失勢次不可緩緩則骨癡韋誕云多力豐觔者聖無力無觔者病書法有十戒一蠢俗二力弱三柔細四娬媚五讓右六板律七狹長八葳􅅋九向背不得宜十上下不聯屬是也蠢俗則不大雅力弱則不遒勁柔細則不卓練娬媚則不蒼古讓右則套落庸劣板律則氣運不動狹長則勢不冠冕葳􅅋則不揚眉吐氣向背不宜則結體無情上下不聯屬則神不流貫凡此十者犯一不可言書書法離鈎卷四
