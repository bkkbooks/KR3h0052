body:
  text: 書法離鈎卷九明潘之淙撰法帖古籕篆石鼔文古文尚書古文孝經延陵季子碑泰山碑望山碑嶧山碑倉頡十五篇詛楚文碧落碑新泉銘張平子碑許慎説文徐鍇通釋六書攷石經遺字碑薛尚功欵識法帖薛尚功重廣鐘鼎韻王梵鐘鼎韻張有復古編又五聲韻譜林罕偏旁小説髙氏五聲韻總夏竦古文四聲韻翟耆年籀史續千文泉志隸書漢隸字源碑本隸韻佐書韻編蔡邕石經碑洪适隸韻洪适隸釋嘯堂集古録眞書鍾繇力命剋捷宣示右軍樂毅畵讚黄庭霜寒大令洛神賦六朝曹娥遺教羊叔子碑智永千字文虞世南孔子廟碑張旭郎官陶𢎞景瘞寉舊館壇歐陽詢九成宫化度寺虞恭公皇甫碑栁公權陀羅尼褚遂良哀册聖教顔真卿麻姑壇放生池中興頌干禄字東方贊行書鍾繇丙舍呉人羸頓雪寒長風逸少蘭亭開元寺又官奴來禽諸帖並見淳化大令地黄鵞羣諸帖並見淳化謝安八月五日褚河南枯樹賦星霜李邕嶽麓娑羅樹雲麾東林寺張從申𤣥静先生碑懷仁聖教序艸書張芝知汝諸帖右軍十七諸帖大令委曲諸帖竝見淳化張旭千文懷素自叙千文聖母藏真淳化閣帖為諸帖之祖絳帖淳化之子潭帖淳化之子太清樓帖淳化之弟戲魚堂帖祕閣續帖黔江帖東庫本鼎帖賜書堂帖蔡州帖彭州帖汝州帖泉州帖脩内司帖利州本甲秀堂帖星鳳樓帖寳晉齋帖玉麟堂帖二王帖羣玉堂帖百一帖近世襍刻種種去古愈逺兹不具載原筆劉熈云筆者述也述其事書之上古用竹簡刀錐畫之或用漆以竹挺子書之詩曰貽我彤管禮曰史載筆説文曰楚曰聿呉曰不律燕曰弗秦曰筆蒙恬始用兔亳為筆毛穎傳云穎中山人蒙恬載以歸始皇封諸管城號管城子累拜中書令呼中書君書指云筆管欲細欲輕毫不欲太剛亦不欲太弱古人以象管為筆重而不適竹管兔毫者為佳取圓熟而健若狸毫者峭而不圓未善也江淹夢筆生花而文章益進王珣夢人授筆如椽而艸武帝哀册諡議筆洵有靈母以毛錐薄之也藏筆須用黄連輕粉明礬漬尖且塞管孔然亦一年而止不可太乆乆則毫宿而易斷也原墨劉氏云墨者畫也畫其迹以為則也上古以漆畫字未嘗有墨毛穎傳云與絳人陳𤣥𢎞農陶𢎞㑹稽楮先生友善出處必偕坡仙云世人論墨多貴其黒而不取其光光而不黒固為棄物若黒而不光索然無神采亦復無用要使其光清而不浮湛湛如小兒目睛乃為佳也又云王晉卿遺墨用黄金丹砂墨成價與金等三衢蔡瑫自煙煤膠外一物不用特以和劑有法甚黒而光殆不減晉卿胡人謂犀黒暗象白暗可以名墨亦可以名茶墨膠以鹿􅊁者為妙然最要椎鍊堅好磨之其光可以照人而四旁可截紙乃貴耳墨舊而膠氣盡者必少光采世重舊墨取其入藥耳若作書畫太舊則煙浮而不光須十年上下者為妙原研劉氏云研者堅也研也太公曰石研孔箸其用乆矣唐皆鳳池研中心如瓦凹故曰研瓦援筆因勢凹則鋒圓書畫亦圓今研如砥援筆則鋒多偏近有􅌯心凸研援筆則三􅊁矣坡翁云建州北苑鳳凰山山如飛鳳下舞之狀山下有石聲如銅鐡作研至美如有膚筠然此殆玉德也疑其太滑然至益墨余名之曰鳳咮又云僕好用鳳咮石研然論者多異同蓋自少得真者為黯黯灘石所亂耳淄石號韞玉研發墨而損筆端石非下嵓者宜筆而褪墨二者當安所去取用褪墨研如騎鈍馬數歩一鞭數字一磨不如騎騾用瓦研也端溪石出肇慶府端溪下嵓舊坑卵石色黒如漆細潤如玉有眼眼中有暈六七眼相連排星斗象此嵓慶歴間坑已竭又有一種卵石去臕方得材色青黒細潤如玉有青花如箸頭大似碧石青瀅或有白㸃如粟排星斗象水濕方見皆扣之無聲磨墨亦無聲此二種石最貴下嵓止有一坑出此二種石其色未嘗紫也别無新坑端溪中嵓舊坑亦卵石也色紫如嫩肝細潤如玉有眼小如菉豆或有緑條文或有白條文堅而圓者為眼横而長者為條扣之無聲磨墨亦無聲此種石亦貴外有青臕色乆用鋒鏌不退北宋時坑已取竭中嵓新坑石色淡紫眼如鸜鵒眼中有暈嫩者扣之無聲磨墨㣲有聲端溪上嵓舊坑新坑石皆灰色紫而麤燥眼如鷄眼大扣之磨墨皆有聲乆用光如鏡面舊坑稍勝新坑惟端溪有眼古云無眼不成端其眼有活眼淚眼死眼活眼勝淚眼淚眼勝死眼又云眼多石中有病辰沅州出一種石色深黒質麤燥或有小眼端溪人取歸刻作端様稱為黒端辰沅人自製者多作犀牛八􅊁等様又有一種􅤰石出九溪􅤰溪表淡青内深紫而帶紅有極細潤者乆用則光如鏡面或有金線及黄脈相間者號為紫袍金帶歙溪石出歙縣龍尾溪舊坑卵石色淡青黒有細紋潤如玉水濕㣲紫或隱隱有白紋成山水星月異象燥則否大者不過四五寸多作月研就其材也或有純黒者此石最貴不減端溪下嵓南唐時方開至宋時盡矣龍尾溪新坑石色亦有青者質麤燥有極大者盈二三尺金星舊坑新坑石淡青色竝麤燥大者盈尺銀星舊坑新坑石色淡青黒竝麤燥有星處不堪磨墨多側取為研大者盈尺萬州懸岩金星石質亞端溪下嵓色漆黒細潤如玉水濕金星則現乾則否極發墨洮河綠石色綠如藍潤如玉發墨不減端溪下嵓出臨洮大河深水底甚難得今有綠石研名洮石者多是􅤰石之表或是長沙山石也􅤰石光而潤亦不受墨銅雀研乃銅雀臺瓦入水多年故滋潤發墨世多偽者未央研乃未央宫瓦亦注水經乆好事者以為研原紙劉氏云紙者砥也平滑如砥上古竹簡韋編漢蔡倫字敬仲用樹膚敝布魚網為之故從巾一從糸氏聲坡翁云成都浣花溪水清勝常以漚麻楮作牋紙堅白可愛數十里外便不堪造信水之力也揚州有蜀岡岡上有大明寺井知味者謂與蜀水相似西至六合岡盡而水發合為大溪溪左右居人亦造紙與蜀産不甚相逺自十年以來所造益多工亦益精更數十年當與蜀紙相亂也北紙用横簾造紋必横其質鬆而厚南紙用豎簾紋豎故二王真迹多是㑹稽豎紋竹紙唐有麻紙其質厚有硬黄紙其質如漿潤澤瀅滑用以書經故善書者多取作字五代有澄心堂紙宋有觀音紙匹紙長三丈有彩色粉牋其質光滑蘇黄多用是作字元亦有彩色粉牋有蠟牋彩色花牋羅紋牋皆出紹興有白籙紙清江紙觀音紙出江西趙松雪巙子山張伯雨鮮于樞多用此紙有倭紙出倭國以􅁞繭為之細白光滑之甚或云倭國無􅁞亦樹膚也紙取無灰者為妙然愈舊愈佳堅滑則勝鬆澁則惡書法離鈎卷九
