front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0052_WYG_003-1a, image: WYG0816/WYG0816-0353c.png}
body:
  text: 書法離鈎卷三明潘之淙撰學篆初學篆當虛手心伸中指并二指於几上虛畫如此流便方可操筆操筆必須單鈎却伸中指在下夾襯方圓平直無不可意矣若篆大字當虚腕懸筆腕箸紙字即不活以紙筒㯶櫚為筆非士夫所為也小篆一也而各有筆法李斯方圓廓落陽氷圓活姿媚徐鉉如隸無垂脚字下如釵股稍大鍇如鉉但字下為玉箸㣲小耳崔子玉多用隸法似乎不精然有漢意陽氷多非古法蓋法子玉也小篆世喜長但以方楷一字半為度一字為正體半為垂腳有不可者當以正腳為主餘略短如幡腳可也無垂腳者如生曰之等字以上枝為出如艸木為物正生則上出枝倒懸則下出枝耳凡寫扁額畫宜肥體宜方圓碑蓋同此但以小篆為正不同襍體凡中字不可填滿但如升斗中箸一字任其空可放垂筆方不覺大比諸字亦須略収不可圓不可方若日月須更収小也包一二畫如日目之類初一字内畫不與兩旁相連後皆如之首尾一法若或接或否不同者非也圓圏圓㸃古文之法小篆無之口字不可三角形鍾鼎古文錯襍用無迹小篆則自一法也學隸漢碑三百餘種無前漢者體各不同亦各不箸名字後人服膺一刻亦自可魏三大碑立為界格已一變矣去漢未逺古意猶存自唐以來巧麗特甚古意冺焉欲學隸者當以石經為祖次及漢刻之竒者如孔子廟碑魏受禪記劉寛之類訣云本於篆法學如真書但變隼尾擊石二波也佩觿云勢如八字有偃波之文吾衍云八分漢隸之未有挑法者也用篆筆作漢隸八分與漢隸多不分括云方勁古拙斬釘截鐡挑抜平硬如折刀頭書指云隸有蠶頭由下筆反挫順筆平行燕尾自出學楷張敬𤣥云楷書把筆妙在虚掌運腕不宜把筆苦𦂳太𦂳則轉換不得既腕不轉則字體或麤或細上下不均雖多用力元來不當翟拍夀問於米老曰書法當何如米曰無垂不縮無徃不収姜堯章云或者專喜方正極意歐顔或者專務匀圓留心虞永或謂體須稍匾則自平正此徐㑹稽之病或謂欲其蕭散則自不俗有王子敬之風豈足以盡書法之美哉禁經云筆貴繞左書尚遲澁此君臣之道也大凡㸃畫不在拘拘長短逺近但勿遏其勢俾令觔骨相連意在筆前然後作字若平直相似狀如算子此但其㸃畫耳非書也祝京兆云大字貴結宻大字不結密則懶散無精神若牌扁須字字相照應掛起自然停分反須𢃄逸氣方不俗小字貴開濶小字易得局促須令字内間架明整開濶冩起一似大體段長史所謂大促令小小轉令大是也當以二王及虞東方畫贊樂毅論洛神賦破邪論序為則書指云真書㸃畫筆筆皆須箸意所貴修短合度意態完足蓋字形本有長短廣狹小大繁簡不可槩齊但能各就本體盡其形勢雖復字字異形行行殊致乃能極其自然令人有意外之想學行訣云行筆而不停箸紙而不離轉輕而重按如水流雲行無少間斷姜䕫云行書與艸不同各有定體縱復晉代諸賢亦苦不相逺大要以筆老為貴少有失悞亦可輝映祝京兆云行書貴穩雅下筆不疾不徐亦有間架須是明淨不要亂筆多絲纒繞疾則失勢緩則骨癡亦以右軍為祖次叅晉人諸帖及懷仁聖教序學艸附章艸自唐以前多是獨艸不過兩字相連後世屬十數字而不斷號曰逰絲此雖出於古人不善學者反更成病唐太宗云行行若縈春蚓字字若綰秋蛇惡無骨也有承接上文有牽引下字乍疾還徐忽徃復収緩以倣古急以出竒有鋒以耀精神無鋒以含氣味相帶則近於俗横畫不欲太長長則轉換遲直畫不欲太多多則神癡意盡則用懸針若再生筆意不若垂露耳艸書最忌横直分明畫多則如積薪束葦無蕭散之氣時一出之為妙虞永興云既如舞袖揮拂而縈紆又若垂藤樛盤而繚繞艸書賦云或斂束而相抱或婆娑而四垂或攅剪而齊整或上下而參差或隂森而髙舉或落脱而自披衆巧百態無不盡竒宛轉翻覆如絲相持姜堯章云學艸書先法張芝次索靖諸人後倣王逸少申之以變化若泛學諸家則當連者反斷當斷者反續不知向背起止轉換古人作字相連處特是引帶是㸃畫處皆重非㸃畫處皆輕雖張顛野逸不失此法艸書之體如人坐卧行立揖遜忿爭乘舟躍馬舞歌擗踊一切變態非苟焉者又一字之體率有多變有起有應如此起者當如此應各有義理祝枝山云艸書貴通暢艸書下筆易於疾須放令少緩徐行穩步一㸃一畫皆有䂓矩不令容易亦有墻壁間架須要明淨方合晉人法度不可如後人全率爾也用筆不可太遲遲則緩慢無神氣不可太疾疾則恐窘步而失勢又云章艸須有古意乃佳下筆要重亦如真書㸃畫明淨有墻壁有間架學者當以索靖張芝皇象韋誕月儀八月帖急就章為模範也論寫姜堯章云㸃者字之眉目全藉顧盼精神有向有背隨字異形横直畫者字之骨體欲其堅正匀淨有起有止所貴長短合宜結束堅實撇磔者字之手足伸縮異度變化多端要如魚翼鳥翅有翩翩自得之狀挑剔者字之歩履欲其沉實晉人挑剔或帶斜拂或横引向外至顔栁始正鋒爲之正鋒則無飄逸之氣轉折者方圓之法真多用折艸多用轉折欲少駐駐則有力轉欲不滯滯則不遒然真以轉而後遒艸以折而後勁不可不知也懸針者筆欲極正自上而下端若引繩若垂而復縮謂之垂露祝京兆云凡偏旁不相稱者屈曲㸃畫以避就之偏少者伸㸃畫以就之偏碍者屈㸃畫以避之太繁者减除之太疏者補續之然必古人有様乃可用耳蘇子云杜陵評書貴痩硬此論未公吾不慿短長肥痩各有態玉環飛燕誰敢憎大抵勁健方痩輕快疏朗乾澁古拙相近軟緩圓肥重滯密促滋潤時媚爲隣然必骨肉適宜剛柔濟美也黄山谷云楷法如快馬斫陣草法欲左䂓右矩又云凡書要拙多於巧近世少年作字如新婦梳籹百種㸃綴終無烈婦態也書指云書必先生而後熟亦必先熟而後生始之生者學力未到心手相違也熟而生者不落蹊徑不隨世俗新意時出筆底具化工也論血字生於墨墨生於水水者字之血也筆尖受水一㸃已枯矣水墨皆藏於副毫之内蹲之則水下駐之則水聚提之則水皆入紙矣捺以匀之搶以殺之補之衂以圓之過貴乎疾如飛鳥驚蛇力到自然不可少凝滯仍不得重改論骨字無骨爲字之骨者大指下節骨是也提之則字中骨健矣縱之則字中骨有轉軸而活絡矣提者大指下節骨下端小竦動也縱者骨下節轉軸中觔絡稍和緩也論觔字之觔筆鋒是也斷處藏之連處度之藏者首尾蹲搶是也度者空中打勢飛度筆意也論肉字之肉筆毫是也疏處捺滿密處提飛平處捺滿險處提飛捺滿則肥提飛則痩肥者毫端分數足也痩者毫端分數省也論脈字之脈章法是也藏鋒出鋒皆欲其首尾相應上下相接其脈相通爲佳後學之士隨所記憶圖寫其形未能渾融皆支離而不相貫吾觀古之名書無不㸃畫振動如見揮運之時此可窺其妙矣書法離鈎卷三
