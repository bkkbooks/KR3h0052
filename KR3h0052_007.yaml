front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0052_WYG_007-1a, image: WYG0816/WYG0816-0380a.png}
body:
  text: 書法離鈎卷七明潘之淙撰品題王羲之云吾書比之鍾張當抗行或謂過之梁武帝云世之學者宗二王元常羲之有過之之論後生遂爾雷同元常謂之古肥子敬謂之今痩張芝鍾繇巧趣精細殆同機神肥痩古令豈易致意逸少至學鍾書勢巧形密及其獨運意疏字緩子敬之不迨逸少猶逸少之不迨元常也陶隱居云伏覽書論使元常老骨更蒙榮造子敬懦肥不沈泉夜逸少得進退其間則玉科顯然可觀比世皆髙尚子敬海内不復知有元常於逸少亦然蕭子雲云見勅旨書商略筆勢洞達字體因此研思方悟隸式始變子敬全法元常庾肩吾云張功夫第一天然次之鍾天然第一功夫次之王功夫不及張天然過之天然不及鍾功夫過之唐太宗云鍾雖擅美一時亦為迥絶論其盡善或有所疑至於布纎濃分疏密霞舒雲卷無所間然但其體則古而不今字則長而逾制語其大量以此為瑕獻之雖有父風殊非新巧字勢疏痩如隆冬枯樹槎枿而無屈伸筆蹤拘束若嚴家餓隸羈羸而不放縱詳察古今研精篆隸盡善盡美其惟逸少乎其㸃畫之工裁成之妙煙霏霧結狀若斷而復連鳯翥龍翔勢欲斜而反直玩之不覺其倦覽之莫識其端心慕手追此人而已孫過庭云元常專工於隸書伯英尤精於艸體彼之二美逸少兼之擬艸則餘真比真則餘艸以子敬之豪翰擅右軍之筆札雖復麤傳楷則實恐未紹箕裘是知逸少之比鍾張則專博斯别子敬之不及逸少無疑矣張懷瓘云若真書古雅則元常第一若真行妍美粉黛無施則逸少第一若章艸古逸極致髙深則伯度第一若章則勁骨天縱艸則變化無方則伯英第一其間備精諸體惟獨右軍次至大令又云鍾書狀貌亦古乏於觔力既無奇姿異態有減於齊髙然則梁武之聲價不振實以學元常之故也學鍾張殊極不易不得柔中之骨不究拙中之趣則鍾降而笨矣不得放中之矩不知變中之權則張降而俗矣巵言云宋齊之際右軍幾為大令所掩梁武一評右軍復伸唐文再評大令大損宋齊之際人語曰買王得羊不失所望蓋時重大令而羊欣為大令門人妙有大令法者也中睿之季人語曰買褚得薛亦不落節蓋時重河南而薛稷為河南甥妙有河南法者也東坡云張長史書必俟醉或以為竒醒即天真不全此乃長史未妙猶有醉醒之辨若逸少何嘗寄於酒乎又云永禪師書骨氣深穩體兼衆妙精能之至反造疏淡如觀陶彭澤詩初若散緩不収反覆不已乃識其竒趣歐陽率更書妍𦂳㧞羣尤工於小楷勁嶮刻厲正稱其貌耳褚河南書清逺蕭散㣲襍隸體古之論書者兼論其平生苟非其人雖工不貴也張長史艸書頹然天放略有㸃畫處而意態自足號稱神逸今世稱善艸書者或不能真行此大妄也真生行行生艸真如立行如行艸如走未有未能行立而能走者也今長安猶有長史眞書郎官石柱記作字簡逺如晋宋間人顔魯公書雄秀獨出一變古法栁少師書本出於顔而能自出新意其言心正則筆正者非獨諷諫理固然也又云歐陽文忠公用尖筆乾墨作方濶字神采秀發膏潤無窮後人觀之如見其清眸豐頰進趨如也又云楊公凝式筆迹雄傑有二王顔栁之餘此真可謂書之豪傑蔡君謨書天資既髙積學深至心手相應變態無窮遂為本朝第一然行書最勝小楷次之艸書又次之大字又次之分隸小劣又嘗出意作飛白自言有翔龍舞鳳之勢黄山谷云李西臺出羣㧞萃肥而不剰肉如世間美女豐肌而神氣清秀者也宋宣獻富有古人法度清痩而不弱此亦古人所難歐陽文忠公頗於筆中用力乃是古人法但未雍容耳徐鼎臣筆實而字畫勁亦似其文章至於篆則氣質髙古與陽氷竝馳爭先也又云東坡道人少日學蘭亭故其書姿媚如李北海至酒酣放浪意忘工拙字特痩勁似栁誠懸中嵗喜學顔魯公楊風子其合處不減李北海至於筆圓而韻勝挾以文章妙天下忠義貫日月之氣本朝善書自當推公第一又云余嘗評近世三家書楊少師如散僧入聖李西臺如法師叅禪王著如小僧縛律恐來者不能易余此論也又云米元章書如快劍斫陳彊弩射千里所當穿徹書家筆勢亦窮於此然似仲由未見孔子時風氣耳又云王著極善用筆若使胸中有書數千卷不隨世緣碌碌則書不病韻蓋美而病韻者王著勁而病韻者周越皆渠儂胸次之罪非學者不盡功也姜堯章云歐陽率更雖結體太拘而用筆特備衆美風流瀟灑追迹鍾王顔栁結體既異用筆復溺一偏書法一變字畫剛勁髙明固不能無助而晉魏之風掃地矣王履道云世之學東坡者多矣劍㧞弩張驥奔猊抉則不能無至於尺牘狎書姿態横生不矜而妍不束而嚴不軼而豪蕭散容與霏霏如初秋之霖森疏掩抑熠熠如從月之星紆餘宛轉纚纚如縈繭之絲恐學者未易至也豐道生云雙鈎懸腕讓左側右虛掌實指意前筆後古傳筆法也妙在第四指得力俯仰進退収徃垂縮剛柔曲直縱横轉運無不如意則筆在畫中而左右皆無病矣此法鍾王之後惟藏真得之為多庻幾於是者唐則虞伯施歐陽信本禇登善孫虔禮鍾紹京張伯髙李泰和顔清臣栁誠懸楊景度後主重光宋則蔡君謨米元章元則巙子山趙子昻本朝則宋仲珩李伯貞祝希哲文徴仲也王弇州云山谷書以側險為勢以横逸為功老骨顛態種種槎出又云趙承旨書功力完足故於腕指間從容變化各極其致中有疏而密者柔而勁者生而熟者緩而𦂳者出山隂入大令傍及虞褚不露蹊逕正以博綜勝耳右軍之書骨在肉中趣在法外𦂳勢淳質古意不可到故智永伯施尚能繩其祖武也歐陽不得不變其真旭素不得不變其艸永施之書學差勝筆旭素之書筆多學少學非為積習也乃淵源耳顔書貴端骨露觔藏栁書貴遒觔骨盡露智永伯施有書學而無書才顛旭狂素有書才而無書學河南北海有書姿而無書體平原誠懸有書力而無書度也唐文皇以定天下之力摹書法以取天下之才習書學而不能脱人主面目𤣥徽亦然智永不能脱僧氣歐陽率更不能脱酸餡氣顔栁趙呉興不能脱俗氣宋蔡忠惠略取古法加以精工稍滯而不大暢蘇文忠正行出入徐浩李邕劈窠大書源自魯公而㣲韻行艸稍自結搆雖有墨猪之誚最為淳古黄山谷大書酷倣瘞寉狂艸極擬懷素姿態有餘儀度少乏米元章源自王大令褚河南神采奕奕終愧大雅是四君號為宋室之冠然小楷絶響矣子瞻似顔極口平原魯直效陶推尊瘞寉元章出褚左袒河南河南楷似行然自有楷平原艸似楷然自有艸李北海楊凝式黄魯直無楷矣米元章有書才而少書學黄長睿有書學而少書才故評隲古人墨刻真贋有相牴牾者然長睿引證各有依據不似元章之孟浪也虞伯生謂坡谷出而魏晉之法盡米元章薛紹彭黄長睿諸公方知古法而長睿所書不逮所言紹彭最佳而世遂不𫝊米氏父子最盛行舉世學其奇怪敝流金朝而南方獨盛歐虞顔栁旭素以至蘇黄米蔡各用古法損益自成一家趙承旨則各體俱有師承小楷法黄庭洛神於精工之内時有俗筆碑刻出李北海北海雖佻而勁承旨稍厚而軟於行書得二王筆意可出宋人上比之唐人尚隔一舍元人自趙呉興外鮮于伯機聲價幾與之齊極圓健而不能去俗鄧文原有晉人意而㣲近麤巙子山有韻氣而結法少疏然是三人者呉興之流亞也虞伯生差古雅鮮于必仁朗朗有父風掲曼碩父子美而近弱張伯雨健而近佻柯敬重老而近麤班彥功少頗遒爽晩成惡札龔璛陳深皆長於題䟦倪元鎮㣲有韻而未成國朝宋璲仲珩學士濓次子也真行艸篆俱入能品宋克仲溫正體頗秀健出宣示戎輅而失之佻章艸是當家健筆縱横差少含蓄宋廣昌裔猶臣於克國初三宋璲為勝祝希哲京兆少年楷法自元常二王至呉興行艸則大令狂素顛旭至李米蘇黄靡不臨寫工絶晩節變化不可端倪風骨爛漫天真縱逸足配呉興它所不論乃李貞伯之子壻徐有貞之外孫也文徴明待詔小楷師二王精工之甚惟小尖耳艸師懐素行倣蘇黄米晩嵗取聖教損益加以蒼老遂自成家唯絶不作艸耳子博士彭教諭嘉小楷皆足箕裘彭肉而圓嘉俊而佻臨摹雙鈎第一手也李應禎少卿善懸腕疾書書述云質力髙邁乃特違衆棄去根源或從孫枝翻出已意别安耳目王履吉初法虞智行書法大令最後益以遒逸巧拙互用合而成雅文以法勝王以韻勝不可優劣也陸深文裕小楷精謹自謂有黄庭遺意然不能離呉興也行艸法李北海趙呉興晩節尤妙附袁昻古今書評王右軍書如謝家子弟縱復不端正者爽爽有一種風氣王子敬書如河洛間少年雖皆充悦而舉體沓拖殊不可耐羊欣書如大家婢為夫人雖處其位而舉止羞涩終不似真徐淮南書如南岡士大夫徒好尚風範終不免寒乞阮研書如貴胄失品次叢悴不復排突英賢王儀同書如晉安帝非不處尊位而都無神明庾肩吾書如新亭傖父一徃見似揚州人共語便音態出陶隱居書如呉興小兒形容雖未成長而骨體甚駿快殷均書如髙麗使人抗浪甚有意氣滋韻終乏精味袁崧書如深山道士見人便欲退縮蕭子雲書如上林春花逺近瞻望無處不發曹喜書如經論道人言不可絶崔子玉書如危峯阻日孤松一枝有絶望之意師宜官書如鵬羽未息翩翩自近韋誕書如龍威虎振劍㧞弩張蔡邕書骨氣洞達爽爽有神鍾司徒書字十二種意意外殊妙實亦多竒邯鄲淳書應䂓入矩方圓乃成張伯英書如漢武帝愛道慿虚欲仙索靖書如飄風忽舉鷙鳥乍飛梁鵠書如太祖忘寢觀之䘮目皇象書如歌聲繞梁琴人捨徽衛恒書如揷花美女舞笑鏡臺孟光禄書如崩山絶崕人見可畏李斯書世為冠蓋不易施平張芝經竒鍾繇特絶逸少鼎能獻之冠世四賢共類洪芳不滅羊真孔艸蕭行范篆各一時絶妙右二十五人自古及今皆善能書奉勅遣臣評古今書臣既愚短豈敢輒量江海但聖旨委臣斟酌是非謹品字法如前伏願照覽謹啓普通四年二月五日内侍中尚書令袁昻啓勅旨具之如卿所品臣謂鍾繇書意氣密麗若飛鴻戲海舞寉游天行間茂密實亦難過蕭思話書走墨連綿字勢屈彊若龍跳天門虎臥鳳閣薄紹之書字勢蹉跎如舞女低腰僊人嘯樹乃至揮毫振紙有疾閃飛動之勢臣淺見無聞暗於明滅寜敢謬量山海以聖命自天不得斟酌過失是非如獲湯炭盛熈明云善書者聲譽著於時書翰傳於後皆可歴數至於謬當虛名庸亦有之其泯沒無聞者固已何限况乎好利售奇𫝊榻亂真自非精鑒鮮能去取也故纂輯評論研究書刻精麤以備采摭云倉頡史籕李斯趙髙程邈王次仲陳遵史游杜操劉穆杜度劉德昇崔瑗崔實曹喜邯鄲淳師宜官衛𢎞蔡邕張芝張㫤胡昭韋誕鍾繇鍾會皇象梁鵠衛瓘索靖張華嵇康謝安衛夫人王廙王羲之王獻之王泯葛輿阮研右舊評上品嚴延年許慎班固羅暉趙襲魏武帝呉孫皓劉邵毛𢎞衛覬衛恒司馬攸陸機劉輿庾亮庾翼王導王敦郄氏羲之妻王徽之王𤣥之王凝之王操之皆羲之子工艸隸謝道韞郄愔郄超桓𤣥杜預李式張翼羊欣薄紹之孔琳之張超殷均謝靈運謝綜陶𢎞景郭伯道李鎮東左伯張彭祖任靖韋昶張永范懷約呉休尚施方泰康昕王崇素張昭朱誕徐希秀劉繪王知敬丘道䕶許文静宋文帝王僧䖍蕭子雲智永唐太宗虞世南漢王元昌歐陽詢褚遂良薛稷張從申李陽氷張旭顔真卿懷素李邕栁公權右舊評中品何曾羊祐晉元帝王恬王洽王薈王修王珣王濛張敞張澄王裒張紘范曄蕭思話謝脁謝静謝敷姜翊梁宣韋秀鍾輿向泰羊溉識道人庾黔婁宋炳湯繩費元瑶孫奉伯諸葛融楊潭張炳岑淵張輿王濟劉穆之張融朱齡石庾景休褚元明孔敬通王藉衛宣李韞陳基傅廷堅張紹隂光韋熊張暢曹任宋嘉裴邈羊固傅夫人辟閭訓謝晦孔閭顏寳光周仁皓張欣泰張熾徐幹僧岳道人徐令文王愔顏清王彬之法髙道人栁惲徐淮南張斯齊髙帝劉珉蕭特庾肩吾袁松梁武帝梁簡文梁元帝陳文帝褚淵沈君理張正見智果蕭綸房彦謙張大隱殷令名簡静文錢毅劉逖王晏解斯彦明周顒虞綽魏徴徐浩房𤣥齡陸柬之鄔彤盧藏用裴行儉王承烈髙正臣傅𤣥楊肇崇簡蔡隱丘韓擇木梁林卿張庭珪史維則孫過庭張懷瓘史麟梁耿張芬房廣沈益張彪陸曾桓夫人傅玉王紹宗程廣張越蕭誠韋陟宋儋沈千運關操鄭虔李璆呉郁頼文雅賀知章何昌裔宋之問李清𤣥悟湛然右舊評下品書法離鈎卷七
