  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0052_WYG_002-1a, image: WYG0816/WYG0816-0346c.png}
body:
  text: 書法離鈎卷二明潘之淙撰取法學貴取法則可以見古人於寸楮而臻其妙蔡雍入嵩山學古於石室得素書八角垂芒頗似篆籕寫史籕李斯等書筆勢雍得之三日不食大呌欲狂若對千人遂讀三年妙達其理後筆特異遂作筆論鍾繇見蔡雍筆法於韋誕自捶胸盡青因嘔血誕死繇令人盜發其墓得之故知多力豐斤者勝無力無斤者病一一從其消息而用之王羲之少學衛夫人書及渡江北見李斯書之許見鍾繇梁鵠書之洛見蔡雍書張嶽碑始悔學衛夫人徒廢年月又云頃尋諸名書鍾張洵為絶倫餘不足觀詹孟舉云李陽氷見潭州碧落碑寢碑下數日不忍去歐陽詢見索靖古碑駐馬觀之去數步復還下馬觀之倦則布氈坐觀之宿碑旁三日乃去張懷瓘云上則法於自然次則歸於篆隸又次師於鍾王夫學鍾王尚不繼虞禇况冗冗哉唐舒元輿陽氷篆志云今世所重秦斯之迹豈能盡辨别之以秦古斯邈矣况今去古愈逺晉魏真迹尚不可見篆隸之風不益遐哉宜其日流而日弊也初學筆勢論云初業書要類乎本緩筆定其形勢忙則失其規矩但取形質快健手腕輕便方圓大小各不相犯莫以字小易而忙行筆勢莫以字大難而緩展毫端張敬𤣥云初學必先真書若便學縱體則真體難成矣虞永興云掇筆往來懸管自在但使體勢雄壯不可拘其小節若畏懼生疑否臧不決運用迷於筆前振動惑於手下師心因乎獨見弟子執其寡聞恥請問於智人忌藝能之勝已若欲造𤣥未之見也孫過庭云初學分布但求平正既知平正務追險絶既能險絶復歸平正東坡云真生行行生草真如立行如行草如走未有未能立而能行能走也山谷云古人學書不盡臨摹張古人于壁間觀之入神則下筆時隨人意學字既成且養於心中無俗氣然後可作以示人為楷式凡作字須熟觀晉魏人書㑹之於心自得古人筆法也書指云善學書者其初不必多費楮墨取古人之書而熟觀之閉目而索之心中若有成字然後舉筆而追之字成而以相校始得其二三既得其四五然後多書以極其量自將去古人為不逺矣執筆衛夫人云學書先學執筆真書去筆頭二寸一分行草去筆頭三寸一分下筆㸃畫波掠屈曲須盡一身之力送之虞世南云筆長不過六寸真一行二草三指實掌虛韓方明云五指撮管末可大草書姜堯章云真書執筆近頭行書寬縱執宜稍逺草書流逸執宜更逺逺取㸃畫長大易於分布齊勻張懷瓘云若執筆淺則堅掣打徑三寸而一寸箸紙勢則有餘若執筆深則束牽三寸而一寸箸紙勢已盡矣筆在指端則掌虛運動適意騰躍頓挫生意在焉筆居半則掌實如樞不轉制豈自由乃成稜角筆則死矣韋榮夫云搦破管畫破紙飛鋒結體山谷云能使筆力悉從腕中來筆尾上直當得意東坡云把筆無定法要使虛而寬歐陽公云當使指運而腕不知方其運也左右前後却不免敧側及其定也上下如引繩此之謂筆正操手盧雋云拓大指擫中指斂食指抵名指令掌心虛如握卵此大要也以大指節外置筆令轉動自在名指抵中指小指拒名指此細要也唐太宗云腕豎則鋒正正則四面鋒全次實指實則節力均平次虛掌虛則運用便易張敬𤣥云運腕不可太緊緊則腕不能轉而字體粗細上下不均不可懸臂氣力有限若行草須懸腕大草書須懸臂筆勢無限也韓方明云雙指包管五指共執實指虛掌鉤撇托送若以單指包之則力不足而無神氣姜堯章云淺其執牢其筆實其指虛其掌執之欲緊運之欲活不可以指運筆當以腕運筆執之在手手不主運運之在腕腕不知執故孫氏有執使轉用之法執謂淺深長短使謂縱送牽掣轉謂鉤環盤紆用謂㸃畫向背祝枝山云擫捺鉤揭抵拒導送八法謂撥鐙法撥者筆管箸俗作著中指名指尖圓活易轉動也鐙即馬鐙筆管直則虎口間如馬鐙也足踏馬鐙淺則易出入手執筆管亦欲淺則易撥動也擫者大指骨下節下端用力欲直如提千鈞捺者食指箸中節旁此二指主力鉤者中指箸指尖鉤筆下揭者名指箸指外爪肉際揭筆下抵者名指揭筆中指抵住拒者中指鉤筆名指拒定此二指主運轉導者小指引名指過右送者小指送名指過左此二指主來往枕腕者以左手枕右手腕提腕者肘箸按而虛提手腕懸腕者懸箸空中最為有力用筆纂要云右軍用筆內擫而收斂故森嚴而有法大令用筆外拓而開廓故散朗而多姿右軍云轉筆宜左右回顧無使節目孤露藏鋒㸃畫使左先右至回左亦然藏頭圓筆屬紙令筆心當畫中行虞世南云覆腕上搶掠毫開下撇撥歷鋒轉有斤骨指端橫鉤蹲踞之狀行書則覆腕搶毫乃按鋒直進其綰也內拓外旋結鋒環轉結者上促旋毫不絶內轉鋒也加以掉筆聯毫容曵而來往徑而復虛書法云夫用筆之法須先急回後疾下如鷹望雕逝信其自然不得重改送筆若遊魚得水舞筆如景山興雲或卷或舒乍輕乍重若深思此理當自見又云用筆不欲太肥肥則形濁不欲太瘦瘦則形枯太露鋒芒則意不持重深藏圭角則體不精神山谷云凡學書欲先學用筆用筆之法欲雙鉤回腕掌虛指實以無名指倚筆則有力筆鋒右軍云每作㸃畫皆懸管掉之令其鋒開自然徑健草則縱心奔放覆腕轉促懸管聚鋒柔毫外拓左為外拓右為內伏連卷收攬吐納內轉藏鋒也但先援筆引興心逸則急接鋒以取興興盡則已又生􅝷鋒任毫端之竒妙象兔絲之縈結轉剔刓角多勾篆體或如蛇形兵陳無常定也張旭云禇河南論書用筆如印泥畫沙始不悟後於江岸以錐畫沙始信其言貴藏鋒也蔡希綜云始下筆須藏鋒轉腕前緩後急形勢相連莫斷簡略為上至如稜側起伏隨勢所立圓規為妙其有誤發不可再模恐失筆勢如放箭不欲遲如髙峰墜石也姜堯章云筆正則鋒藏筆偃則鋒出一起一側一晦一明而神竒出焉常欲筆鋒在畫中則左右皆無失矣下筆之初有折鋒有搭鋒一字之體定於初下筆凡作字第一多是折鋒第二三字承上筆勢多是搭鋒一字之間右邉多是搭鋒應其左故也又有平起如隸藏鋒如篆折搭多精神平藏善含蓄定心書者心畫也必先乎心而後乎手內而理乎已之心外而盡乎古之法心而致乎手之正法而致乎筆之妙蔡雍云寫者散也欲書先散懷抱任情恣性然後書之若迫於事雖中山兔毫不能佳也夫書先默坐靜思隨意所適口不出言氣不盈息沉密神采如對至尊則善矣羲之云夫欲書先凝神靜思預想字形大小偃仰平直振動令斤脈相連意在筆前文在筆後衛夫人云有心急而執筆緩者有心緩而執筆急者執筆近而不能緊者此心手不齊意後筆前者敗執筆逺而急者心手相得意前筆後者勝栁公權云用筆在心心正則筆正朱晦庵筆法銘云握管濡毫申紙行墨一於其間㸃㸃畫畫放意則荒取研則惑必有事焉神明其德知道談景升云心不疑乎手手不疑乎筆然後知書之道和暢非巧也學古非朴也柔弱非美也彊梁非勇也神之所沐氣之所浴是故㸃策蓄血氣顧盼含性情無筆墨之迹無機智之狀無剛柔之容無馳騁之象若黃帝之道熙熙然君子之風穆穆然是故觀之者其心樂其神和其氣融其政太平其道無朕夫何故見山思靜見水思動見雲思變見石思貞人之常也張懷瓘云大巧若拙明道若昧靜而求之或存躁而求之或失明目諦察而不見長䇿審逼而不知豈徒倒薤懸針偃波垂露而已哉從性虞世南云收視返聽絶慮凝神心正氣和則契於妙心神不正書則敧斜志氣不和字則顛仆字雖有質迹本無為稟隂陽而動靜體萬物以成形必資神遇不可力求也必須心悟不可力取也禁經云有攻無性神采不生有性無攻神采不變孫過庭云右軍之書末年多妙緣思慮通達志氣和平不激不厲風規自逺子敬以下莫不鼓弩為力操置成體豈獨工用不侔亦性情懸隔也又云右軍書樂毅論則情多拂鬱書東方贊則意涉瓌竒書黃庭經則怡懌虛無書太師針則縱橫曲折蘭亭集則思逸神超私門戒誓則情拘意慘所謂涉樂方笑言哀已歎情動乎中取㑹風騷之意陽舒隂慘本乎天地之心朱晦翁云歐公作字如其為人外若優游中實剛徑荆公則躁擾急迫書札細事德性相關如此峭翁云觀其書篆而知人之性情焉祝枝山云情之喜怒哀樂各有分數喜則氣和而字舒怒則氣粗而字險哀則氣鬱而字斂樂則氣平而字麗情有輕重則字之斂舒險麗亦有淺深變化無窮氣之清和肅壯竒麗古淡互有出入題是山水仙隱氣自然清富貴宴樂氣自然和朝廷禮義氣自然肅珍怪豪傑氣自然壯自然竒佳麗園池氣自然麗造化上古氣自然古幽貞閒適氣自然淡八種交相為用變化又無窮矣適志翰林禁經云書法有九生一生筆純豪為心軟而復健二生紙新入篋笥潤滑易書即受其墨若久露風日枯燥難用三生研用則貯水畢即乾之司馬云研石不可浸潤四生水義在新汲不可久停停不堪用五生墨隨要旋研凝和墨光為上多則泥鈍六生手適攜執勞腕則無準七生神凝神靜思不可煩躁八生目寢息適寤光朗分明九生景天氣清明人心舒恱備此九者乃可言書孫過庭云一時而書有乖有合合則流媚乖則凋疏神怡務閒一合也感惠狥知二合也時和氣潤三合也紙墨相發四合也偶然欲書五合也心遽體留一乖也意違勢屈二乖也風燥日炎三乖也紙墨不稱四乖也情怠手䦨五乖也乖合之際優劣互差得時不如得器得器不如得志五乖同萃思遏手蒙五合交臻神融筆暢暢無不適蒙無所從解悟張旭見擔夫與公主爭道及公孫大娘舞劒而悟草法又曰孤蓬自振驚沙坐飛余思而為書而得竒怪顔魯公謂懷素曰學書於師授之外須自得之張長史觀孤蓬驚沙之外見劒器始得低昻回翔之狀未知塢彤有之乎素曰似古叉腳為草書豎畫之極顔曰何如屋漏痕素曰吾觀夏雲多竒峰輒嘗師之夏雲因風變化無常又遇壁坼之路一一自然雷簡夫云余晝卧聞江瀑漲聲想其翻駛掀磕髙下奔逐之狀起而作書心中之想皆出於筆下矣文與可云見蛇鬬而草書長記異淮南子云倉頡造書天雨粟鬼夜哭又曰龍備藏大令於會稽山見一異人披雲而下左持紙右持筆遺獻之受而問曰君何姓字何游處筆法何施答曰吾象外為宅不變為姓常定為字其筆迹豈殊吾體耶獻之佩其言虞世南云右軍謂耽玩之功積如丘山志專者神必應之余中宵遂夢吞筆覺後若在胸臆又假寐見張芝指一道字用筆體法信有之矣楊升庵云嶽麓禹碑刻之紹興者其釋文第六句作南暴昌言余疑文義不貫字形亦不類思之不得是夕夢一魚首黃衣指謂曰此南瀆衍亨四字也寤而觀之形義兩協其所謂思之不得鬼神將通之耶書法離鈎卷二
