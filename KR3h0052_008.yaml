front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0052_WYG_008-1a, image: WYG0816/WYG0816-0388a.png}
body:
  text: 書法離鈎卷八明潘之淙撰賞鑒辨古人墨迹當觀其用筆雖體制飄逸興思不同其法一也有如真書宜逐筆拆看不可全以紙色體勢言之響榻僞墨迹用紙加碑帖上向明處以遊絲筆圈郤字畫填以淡墨謂之響榻然圈隱隱猶存其字亦不精彩唐肅誠僞為古帖示李雍曰右軍真迹雍欣然曰是真物誠以實告雍復視曰細看亦未能好以此論之古帖前墨未易辨也古墨迹紙色必表古而裏新贋作者用古紙浸汁染之則表裏俱透微揭視之乃見矣東坡云辨書之難正如聽響切衇知其美惡則可自謂必能正名之者皆過也蘭亭帖世以定武本為第一金陵清涼本為第二其定武本薛珦别刻石易去宣和間於薛珦家入禁中建炎南渡不知所存清涼本洪武初因寺入官其石留天戒寺僧金西白盜去後事發其僧繫獄死石遂不知其處山谷云蘭亭叙草王右軍平生得意書也反復觀之略無一字一筆不可人意摹寫或失之肥瘦亦自成妍要各存之以心㑹其妙處爾又云觀其筆意右軍清真風流氣韻冠映一世可想見也今時論書者憎肥而喜瘦黨同而妬異曽未夢見右軍腳汗氣豈可言用筆法耶弇州云蘭亭如聚訟自宋已然即以定武一石言之有肥者有瘦者有五字未損者有五字損者何子楚王明清謂唐時諸供奉榻此帖獨歐陽率更逼真石留之禁中他本在外爭相摹榻而歐本獨不出耶律德先入汴得而棄之殺胡林流轉李學究家以至復入公庫所謂未損本也定武薛帥子紹彭摹之他石以應世購潛易古刻於湍流落左右五字微劖一二筆藏於家大觀中人主知之取進御龕之宣和殿壁師陷諸珍寶悉逐而北而此獨留宗汝霖得之以進光堯至維揚而復失之所謂損本也然則紹彭之所别摹者亦得稱未損本也夫未損本既有兩種不易辨而先榻者又不可得蓋不能不取極於損本矣唐人臨褉帖自湯普徹馮承素趙模諸葛貞外其嚴整者必歐陽率更而佻險者咸屬褚河南太傅宣示帖為丞相始興公寶愛以授右軍右軍以授王修修死從殉遂不傳傳者乃右軍别臨本梁武所謂勢巧形密勝於自運者也外景樂毅俱有完本不完本完本則爛若舒錦不完本則零若遺珠三復之餘覺不完者差勝二書見駁通人幾成子朝之誣至有以為吳通微及王箸筆者此中尚可容虞褚數人不知通微輩能辦之否沈存中謂樂毅論是右軍手書刻石唐文皇將以殉葬此殆是夢中語按此論乃右軍手書以貽子敬者至梁武已疑其為摹迹而陳文帝時賜始興王貞觀中進御十三年命起居郎褚遂良排署至中宗朝太平公主攜出以錦袋裝之後變起咸陽老嫗竊得為吏所迹迫而投之爨下宋有二石本其一祕閣所刻其一髙紳學士家所藏蓋它摹本之夀諸石者也曹娥碑小楷則右軍軼塵行筆則蔡卞竭蹶矣不謂中間尚藏北海其流利豐妍肉不欺骨自是可人曹娥碑憔悴宛篤若花蕊漂流幼女捐軀於波間東方朔贊遒逸瀟灑令人作天際真人想黃庭經象飛天仙人樂毅論象端人正士不得意昔人謂洛神賦象凌波神考趙吳興孟俯謂所得之陳集賢者十三行僅二百五十字繫晉麻紙字畫神逸墨彩飛動為天下法書冠又謂宣和書譜所藏末有栁公權跋語者其行字筆意皆同而小乏韻且繫唐硬黃紙定以為臨本無疑東坡云唐太宗購晉人書自二王以下僅千軸蘭亭以玉匣葬昭陵世無復見其餘皆在祕府至武后時為張易之兄弟所竊後遂流落人間在王涯趙延賞家涯敗為軍人所劫剝去金玉軸而棄其書余嘗于李都尉瑋處見晉人數帖皆有小印涯字意其為王氏物也山谷云右軍嘗戲為龍爪書今不復見余觀瘞鶴銘勢若飛動豈其遺法耶歐陽公以魯公書宋文貞碑得瘞鶴銘法詳觀其用筆意審如公說佛遺教經一卷不知何世何人書或曰右軍羲之書此書在楷法中小不及樂毅論耳清徑方重蓋度越蕭子雲數等頃見京口斷崖中瘞鶴銘大字右軍書其勝處乃不可名貌以此觀之良非右軍筆畫也若瘞鶴碑斷為右軍書端使人不疑如歐薛顔栁數公書最為端徑然才得瘞鶴銘髣佛爾唯魯公宋開府碑瘦健清拔在四五間智永真草千文崔氏所藏真蹟薛嗣昌刻之長安漕司者翻本尚完好但太瘦生耳今世惟歐陽醴泉銘多舊本當是宋人好臨倣其書而石堅緻耐拓耳人傳懷仁聖教序為借內府右軍書集成者不知集與習通乃懷仁習右軍之字而書非拘拘集湊也若使集湊則三五字已不免補綴之痕彼其鋒芒映帶章法掩抑又何竒也且其墨蹟久藏項氏近歸武陵楊修齡侍御其字備極八法之妙真墨池之龍象蘭亭之羽翼哉淳化帖宋太宗搜訪古人墨迹於淳化中命侍書王箸用棗木板摹刻十卷於祕閣各卷尾篆書題云淳化三年壬辰嵗十一月六日奉聖旨摹勒上石上有銀錠紋用澄心堂紙李廷圭墨拓打手摹之而不汚親王大臣則賜一本摹刻雖近肥俗然深得古意不見古蹟得此足矣但人間罕得今世人所有皆轉相傳摹者絳帖淳化之子尚書潘師旦用淳化閣帖增入别帖重摹刻草卷於絳州北紙北墨極有精神在淳化閣帖之次其石比淳化帖本髙二字骨法清徑足正王箸肉勝之失然駁馬露骨人未免羸瘦之憾潭帖淳化之子寶月大師摹風韻和雅血肉停勻但形勢俱圓乏峭健之氣慶歷間僧希白重摹本亦佳紹興間第三次重摹者失真矣太清樓帖大觀間奉旨以御府所藏真迹重刻於太清樓較淳化帖有數帖多寡不同其中有蘭亭帖蔡京摹刻京沈酣富貴恣意粗率筆偏手縱非復古意賴刻手精工猶勝他帖耳卷尾題云大觀三年正月一日奉聖旨摹上石太清樓續閣帖劉燾摹刻工夫精緻亞於淳化肥而多骨求備於王箸乃失之粗硬遂少風韻戲魚堂帖元祐間劉次莊以淳化閣帖十卷摹刻於臨江卷尾除去篆題而增釋文頗為有骨格者淡墨榻尤佳在潭帖之次黔江帖秦子明於長沙借寶月古法帖摹刻石載入黔江紹聖院乃潭人湯正臣父子刻石東庫本世傳潘氏子析居法帖石分為二其後絳州公庫乃得上十卷絳守重刻下十卷足為一部名東庫本其家亦復重刻上十卷足為一部於是絳州有公私二本靖康兵火石竝不存金人重摹者蓋天淵矣鼎帖草卷紹興草一年武陵丞趙銍與子濬編次者也較諸帖增益最多中間有右軍黃庭他本所無石硬而刻手不精雖博而乏古意賜書堂帖宋宣獻公刻於山陽有古鐘鼎欵識文絶妙但二王帖未精石已不存後又重摹蔡州帖蔡州臨摹絳帖上十卷刻石出於臨江潭帖之上彭州帖彭州亦刻歷代法帖十卷不甚精彩紙類北紙汝州帖乃摘諸帖中字牽合為之每卷尾有汝州印後㑹稽重摹謂之蘭亭帖修內司帖淳熙間奉旨以御府珍儲刻石禁中卷尾題云淳熙二年乙巳歲二月十五日修內司恭奉聖旨摹刻上石亦名祕閣續帖利州本慶元中以戲魚堂帖并釋文重刻石於益昌釋文字畫較臨江帖稍大泉州帖完善本雖少遜於大觀絳帖比之他刻亦大徑庭凡泉刻第五卷智果而後缺十餘幀其他不爾也甲秀堂帖廬江李氏刻前有王顔書多諸帖未見後有宋人帖亦多星鳳樓帖尚書趙約刻於南康曹士冕摹勒工緻有餘清而不濃亞於太清續帖者也羣玉堂帖韓托胄刻所載前代遺迹亦多有宋人書寶晉齊帖宋米元章芾手摹二王以下真蹟入石者也凡閣帖所載俱置之人皆謂元章特妙臨摹又工作古書畫色以真贋本併示人人往往不能辨此帖雖古意藹然而不能脫米家腕法百一帖王萬慶摹刻筆意清遒雅有勝趣恨刻手不精耳二王帖許提舉刻於臨江摹刻極精章草千文集書家定為漢章帝書而後人復定為杜度書不知章草言以之通章奏耳千文乃梁周興嗣取右軍帖中所有千字作韻語章帝時那得有之疑只是蕭子雲之最得意者孔明對𤣥德語章草法甚妙不知與王中令書先後要皆為妙墨蓋融㑹張芝索靖兩家骨肉豐殺略相宜爾索征西筆短意長誠不可及今人作字大概筆多而意不及智果善學書合處不減古人然時有僧氣可恨羊欣書舉止羞澀蕭衍老翁亦善評書也宋儋筆墨精徑但文詞蕪穢不足發其書王侍中學鍾繇最近真行皆妙昨遂不奉恨深帖有秦漢篆筆中令自言故應不同真不虗爾中令書中有相勞苦語極佳讀之了不可解者當是箋素敗逸字多爾觀其可讀者知其爾也米元章專治中令書皆以意附㑹解說成理故似杜元凱春秋癖耶大令草法殊迫伯英淳古少可恨彌覺成就爾余嘗以右軍父子草書比之文章右軍似左氏大令似莊周也王㑹稽初學書於衛夫人中年遂妙絶古今今人見衛夫人遺墨疑右軍不當北面蓋不知九萬里則風斯在下耳右軍筆法如孟子道性善莊周談自然無不如意王中令人物髙明風流𢎞暢不減謝安石筆札佳處濃纎剛柔皆與人意㑹貞觀書評大似不公去逸少不應如許逺也王謝承家學字畫皆佳要是其人物不凡各有風味耳張長史郎官㕔壁記唐人正書無能出其右者故草聖度越百家無轍迹可尋懷素見顔尚書道張長史書意故獨入筆墨三昧盛𫝊顔公書得長史筆法僧懷素見公自矜得折叉股筆顏公言折叉股何如屋漏痕懷素起捉公手云老賊盡之矣觀魯公乞米乞鹿脯帖與郭令書祭姪文皆當與王中令雁行耳懷素草莫年乃不減長史蓋張妙於肥藏真妙於瘦此兩人者一代草書之冠冕也樂毅論舊石刻斷軼其半者字瘦徑無俗氣後有人復刻此斷石文摹傳失真多矣完書者是翰林侍書王箸寫用筆圓熟亦不易得如富貴人家子非無福氣但病在韻耳東方曼倩畫贊筆圓靜而徑肥瘦得中但字身差長蓋崔子玉字形如此前輩或隨時用一人筆法耳道林嶽麓寺詩字勢豪逸真復竒崛所恨工巧太深耳少令巧拙相半使子敬復生不過如此禁中板刻古法帖十卷當時皆用歙州貢墨墨本賜羣臣元祐中親賢宅從禁中借版墨百餘本分移宫僚但用潘谷墨光輝有餘而不甚黟黑又多木橫裂紋士大夫不能盡别也北墨多用松烟色青北紙橫紋其質鬆厚不甚染墨拂之如薄雲過青天凡北碑皆然不用油蠟南碑用油墨色純黑用油蠟碑文贋墨皆倣此書法離鉤卷八
