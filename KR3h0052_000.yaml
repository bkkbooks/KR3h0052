body:
  text: 書法離鈎目次藝術類一書畫之屬卷一原流六義四學證非述傳古文大篆文奇宇小篆八分隸書飛白楷書行書急就艸書卷二取法初學執筆撡手用筆筆鋒定心知道從性適志解悟記異卷三學篆學隸學楷學行學艸附章艸論寫論論骨論觔論肉論脈卷四體式形狀氣勢布置運用肥瘠方圓遲速勁軟結構弊病卷五鍾意瓘法心頌綱目八法一側二勒三弩四趯五䇿六掠七啄八磔㸃例畫例勾例撇例卷六篤學臨書摹書書丹辨惑先後誤寫利器卷七品題卷八賞鑒卷九古帖原筆原墨原硯原紙卷十切韻臣等謹按書法離鈎十卷明潘之淙撰之淙字無聲號達齋錢唐人與兄之淇字爾瞻者皆工書是編薈萃舊説各以類從大指謂書家筆筆有法必深于法而後可與離法又必超於法而後可與進法俗學株守規繩髙明盡滅紀律俱非作者書中知道從性諸篇皆言不法而法法而不法之意其名離鈎者取釋子垂絲千尺意在深潭離鈎三寸語也然仍訛襲謬不一而足如籀文與古文大篆皆小異故説文序云新莽謂之竒字徐浩云史籀造籀文李斯作篆江式唐元度則謂史籀著大篆十五篇又如隸書在八分之前行書在草書之後故蔡琰云吾父割隸字八分而取二分蕭子良云靈帝時王次仲飾隸為八分説文漢興有草書張懐瓘則謂八分小篆之捷隸亦八分之捷郭忠恕則謂小篆散而八分生八分破而隸書出隸書悖而行書作行書狂而草書聖之淙皆不能辨其妄至楊慎改嶽麓禹碑中南暴昌言四字為南瀆衍亨偽云得之夢中之淙亦信之尤為寡識特其摭錄繁富瑕不掩瑜亦可以備攷證之一助焉乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀凢例一邇日子史盛行而書法獨缺焉不講豈以塗雅小技無裨雕龍不知前代名賢正徃徃寄趣於兹如顔魯公骨法嚴整王大令風神遒邁披玩間便堪想見奚第在筆墨工拙云一書家筆筆有法固矣然法有可傳者有不可傳者但俗學株守規繩而髙明盡滅紀律俱非作者是編一證以六書之源流八法之指趣故從性知道諸篇進不法而法法而不法之妙一評隲徃徃各遵其便各理其師故議論雖多私僻不少今取前賢確議而折衷以歸於當使人知所取從一法帖支派既繁傳譌日甚此獨詳其統系次以品題使新舊妍媸洞如燭照一古人論書者各極意旨此舉歴代諸篇條分縷析使以類從便於叅究一是編雖譚書法饒有佳文即如淳化釋文皆前賢筆札之雋亦甚雅觀一艸書變化由心法多不一近惟艸訣流行其不合者多矣故附刻釋文以窮艸書之變以開取精之門一是編因書論法原宜字字從古但傳譌既乆恐不便讀姑多從俗未敢盡刋即釋文悉照原帖艸法亦以便辨認也若字學之奥隨有字㝈刻行以正譌謬達齋主人識
