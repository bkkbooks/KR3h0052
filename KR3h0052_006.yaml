front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0052_WYG_006-1a, image: WYG0816/WYG0816-0374a.png}
body:
  text: 書法離鈎卷六明潘之淙撰篤學徐季海云張伯英忙則為楷謂匆匆不暇草書臨池學書池水盡黑衣帛必書而後練斯稱草聖鍾丞相入抱犢山十年木石盡黑唐太宗軍中馬上把燭學蘭亭不釋手永禪師登樓不下四十年餘有秃筆頭十甕甕皆數石後瘞之號筆冢乃箸能名懷素種蕉葉萬株以供揮灑號其居曰緑天菴漆盤二方兩版皆穿鄭䖍聞慈恩寺貯柿葉數屋往寄寓歲久隸書殆遍東坡云留意於物往往成趣昔人好草書夜夢則見蛟蛇糾結數年後或晝日皆若見之黃魯直云張古書於壁間觀之入神乃可下筆趙子昻學書十年不下樓巙子山平章每日坐衙罷寫一千字方進膳俗云字無百日工以此觀之殆悠謬之談也臨書筆勢論云始臨之時不可盡其形勢一遍正其手二遍少得形勢三遍微微似本四遍加其遒潤五遍益加抽拔如其生澀筆下不滑兩行一度仍臨惟須筆滑不可計其遍數唐太宗云吾少時觀陳即知彊弱今臨古人書不學其形勢惟求其骨力及得其骨力而形勢自生耳吾之所為皆先作意是以果能成名張懷瓘云為書之妙不必應文按本妙在應變無方遇事從宜決之度內者也虞安吉云未得意者一㸃一畫皆求象本轉自取拙耳姜堯章云下筆盡倣古人則少神氣專務遒徑則俗病不除摹書姜堯章云摹書最易唐太宗云臥王濛於紙上坐徐偃於筆下可以嗤蕭子雲惟初學者不得不摹亦以節度其手易於成就皆須是古人名筆置之几案懸之座右朝夕諦觀思其運筆之理然後可以摹臨其次雙鈎蠟本須精意摹榻乃不失位置之美耳臨書易失古人位置而多得古人筆意摹書易得古人位置而多失古人筆意臨書易進摹書易忘經意與不經意也毫髮失真則精神頓異雙鈎之法須墨暈不出字外或郭填其內或朱其背正得肥瘦之本體雖然猶貴乎瘦使工人刻之又從而刮治之則瘦亦肥矣或云雙鈎之時必倒置之則無容私意於其間誠使下本明上紙薄倒鉤何害若下本晦上紙厚郤須能書者為之發其筆意可也夫鋒芒圭角字之精神大抵雙鈎多失之此又須朱其背時稍致意焉書丹筆得墨則瘦得朱則肥故書丹尤以瘦為竒而圓熟美潤常有餘燥徑老古常不足朱使然也欲刻者不失真未有若書丹者苐書時盤礴不無少勞若鍾繇李雍必自刻之可謂癖矣辨惑陽氷云孔壁遺文汲冢舊簡年代浸逺謬誤滋多李斯將束為宋蔡雍以豐同豐魚魯一惑涇渭同流章俊卿云有妄改而誤者罰字古從刀元命包改作寸對字古從口漢文改口從土疉字古從晶新室改三田洛字古從水世祖改從有私語而誤者陸氏釋文以國風為曰風男女為女子名譽為毁譽李祭酒涪說以傳人為嘉期僅得為逺近平生為外甥郭氏佩觿集以塗泥為道塗黨與為取與胄子為甲胄有忌諱而誤者爾雅周禮皆從罪祖龍以與皇字相肖以四下作非代之騧字宋明帝忌與禍字相類以馬旁作瓜代之有穿鑿而誤者班史以龜兹音丘慈范史以龜兹音屈沮審氏名食其音異基趙氏名食其音食其古今人表以君疇為尹夀孟僖本傳以箕子為荄茲有音韻而誤者漢書注河朔謂毛曰無佩觿集巴蜀謂北曰卜西京記以下馬為蝦蟇搜神記以琵琶為婆娑不辨六書音訓則帝虎亥豕莫别矣趙氏曰篆籀廢而分隸興分隸廢而字學昧分隸有匕無匕有􅚀無又有禾無叔漸至支攴同書殳竝作矣先後下筆有先後不可紊也惟草書多變往往難拘楷書則有一定之序不明偏旁遂致顛倒略序二三以俟悟者旁通焉書先次丨次曰長先丨次次將先丨次次肅先肀次次鼎先目次爿次聚先丁次次乑畞先十次田次久歐先次次缺無先次次火馬先丨次次龜先次右先丿次有布同法與先次次僶先次次毋先􅗵次女飛先次次飛臣先丨次匡先主次􅡊烏先次必先次或先次心門先丨次次次齊先次次示次鼠先臼次次次􅡧誤寫此世俗相傳誤書㸃畫者襲謬已久是當改正美從大非從火博㔹從十非從心倏從攸從犬從大非陜陜西從入從人非彞從糸非從分諌從柬非從東解從刀牛從羊非糾赳從丩非從斗覓從爪非從不輩從非非從北斂聚斂從文從缺非觀從非從豐從二丰從豐非聖從壬非從王萬數也万非纂從目非從日佞從非從妄函從非從壷從非從亞翰從人從羽從非鬱俗作鬱非嬴從口非從四覃從早非從卑釁從同從酉非從目從直吳從非從天讒從􅯃免非從二覽從非從劎從刀非從刃奈奈何從大從木非遙從非從爪覻音娶窺覻從虛非𦙍從丿從隱非從人從乙幾從人非從包尋從口非從几裏從丄非從重內出內從入從人非廚庖廚從丄從土從一從豆非刺音次從朿從束非毋音無從丿從非几旁從􅟦從非戛戛然音恝從􅔣從非凊溫清從從水非廏音救馬舍廄非軌從九非從九壑從谷非從幼從力非從刀􅀈從丙非從內僭濳贊從非從㚘帶從非從世勢從土非從幸瘞從非奮從田非從樓數從婁非從婁郵從垂非從垂舊從臼非從舊慶愛從心非從必鼐從非從寧姓也邑也從心用從必非寇從宀非從冖橕從木從牙非從手從手虧從隹非從虛䕫從從自從非從心非從鑿從非從嚏噴嚏從從從疌非獻從鬲從犬獻非頓從非從迥從坰非從向穎從禾非從示纜從非從宦從宀非從穴繼斷從從非從助從且非從耳坰從口非從奇異也零也從大從立非減從水非從冰雎從且非從目陷從非從舀步從少反止也留從留非從卯朿音次木芒與束異竊從從采從耦非衡從角從大從魚非某從甘從木非從其從小虎從虍凡此類從之從非兔從兔非從兔廩從禾非從示習從羽凡此類從之俗作習恐從卂非從凡熏從非從田勇從用非從田祕從示非從禾􅀢音邇從入從小斃從犬非從大匹從口不合從凡疏疏楚胥等字從之沒從非從几采從爪從木從米非炙從非從夕朋斜書從月非從月青從非從月汜音凡從已從已非凡範笵等從之懷從亠從從十非舌從干非從千利器韋誕云工欲善其事必先利其器得筆得紙得墨三者具而復得手然後可逞尋丈之勢方寸千言右軍云紙剛用軟筆紙柔用硬筆純剛如錐畫石純柔如泥洗泥既不圓暢神格亡矣書石同紙剛例蓋相得也又云用筆箸墨不過三分不得深浸深浸則毫弱無力歐陽詢云墨淡則傷神采絶濃又滯鋒毫米芾云作字須要得筆苟得筆則細若絲髮亦佳不得筆雖大逾尋丈終無骨氣東坡云使人作字不知有筆亦是一快又云製墨之妙正在和膠今之造佳墨者非不擇精烟而不佳絶者膠法謬也又云研細而不退墨紙滑而字易燥皆尤物也又云研之發墨者必費筆不費筆則退墨二德難兼非獨研也大字難結密小字常局促真書患不放草書苦無法姜堯章云作楷墨欲乾不可太燥行草則燥潤相得潤以取妍燥以取險墨濃則筆滯墨燥則筆枯筆欲鋒長徑而圓長則含墨可以揮灑徑則有力圓則妍美長而不徑不如勿長徑而不圓不如勿徑書譜云水太漬則肉散太燥則肉枯乾研墨濕㸃筆濕研墨乾㸃筆又云磨墨之法重按輕推逺行近折濃則滯淡則薄粗則多纍積則不勻又云研池寬面細每夕一洗則水墨調勻骨肉得所端石取細潤停水歙石唯取填澀發墨兼之斯為美矣又云初學須用佳紙令後不怯紙用惡筆令後不擇筆凡書不得自磨墨令手顫斤骨木强是大忌也磨墨不得用研池中水令墨滯筆沍須以水注汲新水臨時斟酌之書法離鈎卷六
