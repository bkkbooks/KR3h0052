  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0052_WYG_005-1a, image: WYG0816/WYG0816-0364c.png}
body:
  text: 書法離鈎卷五明潘之淙撰鍾意梁武帝觀鍾繇十二意一曰平橫也二曰直縱也三曰均間也四曰密際也五曰鋒末也六曰力骨體也七曰輕屈折也八曰決牽掣也九曰補不足也十曰損有餘也十一曰巧布置也十二曰稱大小也張長史問顏魯公答平謂橫者何謂每為一畫皆須縱橫有象也直謂縱者何謂每直必縱之不令邪曲也均謂間者何謂間不容光也密謂際者何謂築鋒下筆皆合宛成不令其疏也鋒謂末者何謂末以成畫使其鋒健也力謂骨體者何謂躍筆則㸃畫皆有斤骨字體自然雄媚也輕謂屈折者何謂鈎筆轉角折鋒輕過又謂轉角為暗過也決謂牽掣者何謂牽掣為撇決意釋鋒不怯滯令險峻而成也補謂不足者何謂結搆㸃畫或有失趣則别㸃畫旁救之也損謂有餘者何謂趣長筆短常使意氣有餘畫若不足也巧謂布置者何謂欲書先想字形布置令其平穩意外字體令其異勢也稱謂大小者何謂大字蹙令小小字寬令大茂密相稱也瓘法張懷瓘用筆十法偃仰向背謂兩字并一字須求㸃畫上下離合之勢隂陽相應謂隂為內陽為外斂心為隂展筆為陽須左右相應鱗羽參差謂㸃畫編次無使平齊峰巒起伏謂起筆促衄如峰巒之狀殺筆亦須蹲結真草偏枯謂兩三合字不得真草合成一字須求映帶邪正失則謂落筆結字分寸㸃畫須依位次遲澀飛動謂勒磔皆須飛動無凝滯射空􅌑瓏謂煙蹙識等字行草用筆不依先後尺寸規度謂勿長有餘而短不足須引筆至盡處則字有凝重之態隨字轉變謂如蘭亭年字一筆作懸針歲字即變垂露其間之字體各别心頌隋僧智果心成頌回展右肩宣髙尚等字也長舒左足其貝真等字也峻拔一角國用周等字也潛虛半腹見目月字畫略粗於左左實右虛也間開間闔無字四畫上開下合四㸃上合下開也隔仰隔覆竝字隔二疆字隔三仰覆也回互留放爻字上捺下波茶字上波下捺也變換垂縮并字左垂右縮斤字左縮右垂上下竝然繁則减除王書懸字作懸虞書字作除下二㸃張書盛字改􅀢為皿疏則補續神加㸃辛加畫也分若仰背川册等字相背也合如對目八州等字須潛相矚視也孤單必大一㸃一畫獨立者大書之也重竝乃促昌吕爻等字宜上小林棘羽等字宜左促也似側映斜丿為斜乀為側交缺人之類也如斜附曲女晏字為曲也覃精一字功歸自得盈虛統視連行妙在相承起伏綱目永字八法綱領所全三靜法地五動象天次及條目變㸃方圓俯仰向背沉瑩清權拗者讓者引焉疑焉鳥立木上鴈在天邊掬特圓起鎗摺迥回聯齊弩磋駐屋漏蜿蜒烏絲䦨者蔡襄所專復有八忌切意精研枯槁生硬輕重纒綿內外是縱左右非堅靜不變動變也㸃下筆成㸃而後行變如髙低濶狹方圓如置箸案上非扁鋒也沉筆不浮瑩明朗無翳清非寒瘦肥亦清也權如鬢字無長㸃拗東西相順讓還地位引如左簷字引而申之疑如帝帶字伏兵不動也鳥立木行仁字鴈在天燕然字也掬本身掬出圓口字特筆寫其上欲起口字也鎗策類摺則筆鋒飛翻非硬直也迥回聯各有虛實不可偏廢也齊勒類弩豎畫磋者左右揭腕駐如駐馬屋漏痕不見起止烏絲䦨鋒正兩旁如界也枯槁無潤澤生硬非軟美輕重不典纒綿不瑩內縱肚腹濶外縱手足長左右揭腕要有力八法李陽氷云逸少十五年偏工永字以其備八法之勢能通一切字也禁經云八法起於隸自崔張鍾王傳受該於萬字墨道之最智永發其旨趣授於世南自此廣焉一側丶也㸃也栁子厚云側不貴卧如髙峰之墜石訣云側下其筆使墨精暗墜徐乃反揭則稜利矣作㸃向左以中指斜頓向右以大指齊頓作報答以中指挫鋒按筆收鋒在內疾則失中過又成俗論云㸃而言側謂筆鋒顧右審其勢而側之止言㸃則不明顧右無蹲鋒向背墜墨之勢若左顧右側則橫摘無力而側不險乃失於鈍鈍則芒角隱而書之神格喪矣俗云㸃㸃之祖蹲鴟之勢此三過側法也起自中而末鋒自中出㸃有尖禿斜正俯仰橫波鴈陳諸法要在隨勢用之變通為妙二勒一也橫畫也栁子厚云勒常患平如千里之陳雲訣云䇿須勒仰筆覆收以中指鈎筆澀進覆筆以中指頓筆然後以大指遣至盡處又云勒不得卧其筆須筆鋒先行又云勒緩縱以藏機論云橫畫言勒謂躍筆而行承其虛畫取其徑澀止言畫慮其不躍一出便盡則鋒拳而怯薄也勒藉於豎躍躍則筆徑澀亡其流滑微可稱工矣唐太宗云為畫必勒貴澀而遲俗云畫畫之祖勒法也狀如算子便不是書其法初落筆鋒向左急勒回向右橫過至末復駐鋒折回鍾王智虞多用篆法為畫歐陽禇薛多用隸法為畫訣云橫畫須直入筆鋒豎畫須橫入筆鋒三弩丨也豎畫也直落也栁子厚云弩過直而力敗如萬歲之枯藤訣云鋒須先發管逐勢行緊收澀進如錐畫沙又云弩彎環而勢曲如深林之喬木又云須發勢而卷筆若折骨以爭力又云弩不宜直其筆筆直則無力立筆左偃而下最須有力論云中心豎畫為弩勢微努曰弩在䟐筆下行若直其畫則形圓勢質書之病也唐太宗云為豎必弩貴戰而雄俗云豎豎之祖弩法也初橫入筆向上行而少駐復引鋒下行至末復駐鋒向上此垂露也末鋒駐而不收引而申之此懸針也畫多則分俯仰以别其勢豎多則分向背以成其體避算子也四躍亅也鈎也剔也內挑也栁子厚云躍宜蹲而勢生峻快如飛訣云躍須蹲鋒得勢而出出則暗收旁鋒輕揭借勢勢不徑筆不挫又云直曰躍橫曰挑鋒貴乎澀適出期於倒收謂之欲挑還置也論云字之出鋒曰挑今曰躍以筆鋒去而言之躍自弩畫收鋒豎筆潛徑借勢而躍之法須挫衄轉筆出鋒佇思消息則神蹤不墜矣張敬𤣥云又謂之抽筆事字中畫宜直下筆便挑不宜停筆俗云鈎鈎之祖躍法也蹲鋒上出險勢旁分然亦分三體左如氏長字須長躍以應右右如門丹字須短躍以應左中如東乘字須朝上也五策一也短橫也折也左上為䇿栁子厚云策仰收而暗揭訣云仰筆潛鋒以鱗勒之法仰收揭腕躍勢於右潛鋒之要左畫勢暗歸於右也又云䇿筆仰鋒豎躍微勒借勢峻顧於掠也論云䇿一名折畫今謂䇿仰筆躍鋒輕擡而進故曰䇿也若及紙便畫不務遲澀向背偃仰者備畫耳唐太宗云䇿者仰䇿仰收俗云短畫短畫之祖䇿法也仰筆躍鋒輕擡而進有如鞭䇿之勢故言䇿不言畫異於勒勒則兩頭下而中髙䇿則兩頭髙而中下如夫天之類凡短畫皆䇿也六掠丿也長撇也腕也分發也左下為掠栁子厚云掠左出而鋒輕訣云撇過謂之掠借於䇿勢以輕駐鋒右揭其腕如以迅出勢旋於左法在澀而徑意欲暢而婉遲留則傷於緩滯又云拂掠須迅其鋒左出而欲利又云微曲而下筆心至卷處論云一名分發掠乃疾徐有準隨手遣鋒自左出取徑險盡而為節發則一出運用無的故掠之精旨可守矣孫過庭云遣不當速唐太宗云為撇必掠貴險而徑俗云撇撇之祖掠法也顔云掠倣佛以宜肥法曰此乃斜懸針而末鋒飛起也宜出鋒處送筆力到而勻不可半塗撇出則無力而瘦弱七啄丿也短撇也右上為啄栁子厚云啄倉皇而疾掩如利劍截斷犀角象牙訣云右向左之勢為卷啄按筆潛蹙於右借勢收鋒迅擲旋右須精險衄去緩滯又云啄如禽之啄物立筆下罨須疾為勝卧斫斜發啄不宜遲論云撇之與掠同出異名撇乃俗言啄因勢立名用輕徑為勝去浮怯重體為工俗云短撇短撇之祖啄法也下筆駐鋒後即出水永字凡短撇皆用之如隼尾也八磔乀也捺也波也右下為磔栁子厚云磔䟐趞以開撑如崩浪雷奔訣云始入筆緊築而微仰便下徐行勢足而後磔之筆或藏鋒或出鋒由心所好須飛動無滯又云微直曰磔橫過曰波抑而後曳捺不宜緩又云抽筆法左罨掠須峻利右潛躍而戰行待勢卷而機駐揭摘而暗收若便拋之必流滑凡淺又云側起平發緊殺按波為抽筆腹內起又云平磔法不遲不疾戰筆側去勢盡不可便出須駐筆而後放論云發波曰磔循古無蹤源其用筆磔法為經磔若左顧右則勢鈍䟐重鋒緩則勢肥法須遒徑而遲澀之禁經云如生蛇度水者是也唐太宗云為波必磔當三折而遣毫磔者不徐不疾去欲復駐而去之庾肩吾云將放更留俗云捺捺之祖磔法也今人作捺多是兩駐雖云三過其實不知此法也其法首搶起中駐而右行末駐筆蹲鋒如蘭葉之狀皆含蓄而不露最為髙也有欣字燕尾者乃急就章之波法也如水自泉口流出其下遇石激而過故曰激石波也㸃例㸃之變無窮皆帶側勢蹲之首尾相顧自成三過偃仰向背等勢箸墨皆磊磊落落如大石當路或如科斗或如瓜瓣或如栗子或蹲如鶚口或尖如鼠矢如斯之類各禀其儀散水法清江旁三㸃是也訣云上衄側中偃下潛按躍鋒或藏或露狀貌遞相顯異也若頻有則兩㸃相近而下㸃當髙此潛相矚視也外須解摘內相附屬為上中潛鋒暗衄下峻躍潛遣之此鍾法行書勢微按輕利又冷凉旁二㸃是也上側覆殺下築而躍之須相承揖若竝連衄側輕揭則率字左右用之烈火法燕然字下四㸃是也訣云衄鋒暗按須各立勢抵背潛衄所謂視之不見考之彌彰聯飛暗衄微駐輕揭潛躍筆鋒連綿相顧不絶又云聯飛如雁陳當秋姜堯章云四㸃者一㸃起兩㸃帶一㸃應若四㸃勻則俗矣曾頭法曾上㸃啄是也對合貴縱上開下合其腳法其下啄㸃是也相對貴橫上合下開訣云左潛揭而右啄曽頭也左啄右側其腳也衮筆法令今下一㸃是也須按鋒上下促衄之烏字法下四㸃是也宜緊收右軍云字有緩急烏字橫直須遲四㸃須急取烏腳急形勢也馬焉字同宀頭法宀音綿訣云上㸃駐鋒左右挫鋒橫畫按筆勢須相順上㸃側橫畫勒左擡筆擺鋒右峻啄輕揭出虞永興常用法以圓峻飛動為美姜堯章云宀頭覆下容寶字上㸃須正畫不宜相箸上長下短暗築法月其字中兩㸃是也馭鋒直衝有㸃連積畫例偃法蹲鋒自駐力到疾提力滿微捺力盡回鋒仰法蹲鋒自駐力到微捺力滿疾提力盡回鋒平法蹲鋒自駐力到疾過力盡回鋒訣云用筆若錐畫沙橫畫放手畫力瘦硬方直沈箸徑健無變為度縱畫硬如屈鐵一縱一橫可方可圓熟瘦硬之鐵畫變溫和之玉畫又云橫畫似八分士兩畫上仰下偃三三畫上潛鋒平勒中背筆仰䇿下緊躍覆收唐太宗云三須解磔上平中仰下覆春生是也禁經云黃庭三關字用草法上衄側中䇿下奮筆橫飛匚音匡有三法一法上平旁向下偃一法上仰旁背下平一法上飛平旁飛向下飛偃空中飛筆緊提轉腕疾出向背二豎竝者宜有向背向筆貴和背筆貴峻丨法丨音衮垂縮法頓筆垂露欲垂復縮懸針法自右軍始筆欲極正自上而下如針垂偏拂法自張顛始張敬𤣥云申字中畫宜卓筆直畫疾抽豎擡尚常中畫用之擡筆豎䇿曰擡挫鋒上下豎直奮筆示系下小字是也訣云左側而獨立中衄折而右勾勾例勾弩訣云勒弩躍圓角躍鋒作弩勢未盡而躍之右軍云作右邊折角疾牽下微開左畔斡轉令取登對勿使腰中傷慢視筆取勢直截而下轉為曲折勾筆轉角折鋒輕過亦謂轉角為暗角唐太宗云貴促鋒而轉張敬𤣥云固字轉角之勢不宜稜角弩張則字體俗矣但有轉筆一切貴圓潤也書勢論云急牽引如雲中掣電日月因目字是也勾裡一法仰勒背擡躍一法偃勒向擡躍訣云圓角激鋒待斤骨而成如武人屈臂右軍云回角不用峻及有稜是也顔魯公云用筆如紙下行丁字丁打宜疾不宜遲寺守亦宜疾挑勾外戈法戈如百鈞之弩發筆訣云以中指遣至盡處以名指拒而躍之潛鋒暗勒勢盡然後躍之右軍背躍戈法上則俯而過下則曲而就永禪師戈法下以名指築上借勢以中指遣之至下以名指衄鋒潛躍名秃出法張旭折芒法潛鋒緊走意盡乃收而躍之章草法潛按微進輕揭暗躍夫揭欲利按欲輕輕則骨徑重則鈍俗唐太宗云為戈必潤貴遲疑而右顧張敬𤣥云戈腳宜斜筆直抽直者緣上實藏鋒下自成也背拋乙躉尾如壯士屈臂隱外掠訣云蹲鋒緊掠徐擲之速則失勢遲則緩怯右軍云腕腳􅀈斡上捺下撚始終折轉援毫蹲鋒即輕重有準庾肩吾云欲挑還置為駐鋒而後躍之風凡字其勢似飛宜圓緊用筆之時左邊勢宜疾背筆時意中如電急几鳯等字同撇例撇法背撇首圓蹲過作背懸針法左出向撇首側蹲右顧作向左筆尾懸鋒左出如手之前後撇物如大天字須直下筆而彎出之左字須斜硬右字須婉轉也彡音杉上平中仰下偃上橫下縱或反之唐太宗云彡乃形影字右邊須背下撇之人王蒙云躍之欲利按之欲輕立人如鳥在柱上姜堯章云一切偏旁須令狹長則右有餘地不可太密太巧唐人之病也重復唐太宗云多字四撇一縮二少縮三亦縮四出鋒戔上磔衄鋒下磔出之訣云上縮鋒作弩下出鋒作躍書法離鈎卷五
