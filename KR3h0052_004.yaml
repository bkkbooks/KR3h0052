front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0052_WYG_004-1a, image: WYG0816/WYG0816-0358a.png}
body:
  text: 書法離鈎卷四明潘之淙撰體式衛夫人云用筆六種結搆圓備如篆法凶險可畏如八分鬱拔縱橫如古隸窈窕出入如飛白飄揚灑落如章草耿介特立如鶴頂然心有委曲每為一字各象其形孫過庭云真以點畫為形質使轉為性情草以點畫為性情使轉為形質草乖使轉不能成字真虧點畫猶可記文回互雖殊文體相涉旁通二篆俯貫八分包括章草涵泳飛白毫釐不别胡越殊風書譜云鍾繇隸竒張芝草聖專精一體以致絶倫伯英不真點畫狼藉元常不草使轉縱橫形狀蔡中郎云為書之體須入其形若坐若立若動若飛若往若來若卧若起若愁若憂若蟲食木葉若利劍長戈若短弩徑矢若水火若雲霧若日月縱橫有象矣鍾繇云筆迹者界也流美者人也萬類象之點如山頽摘如雨線纎如絲毫輕如雲霧去如鳴鳳遊雲漢來如遊女入花林書評云王逸少隸飄若遊雲矯若驚龍唐徐浩草隸如怒猊抉石渴驥奔泉張旭草書如驚蛇入草飛鳥出林薑堯章云折叉股者欲其屈折圓而有力屋漏痕者無起止之迹錐畫沙者勻而藏鋒壁坼路者欲其無布置之巧祝京兆云長者如秀整之士短者如精悍之徒瘦者如山澤之癯肥者如貴遊之子徑者如武夫媚者如美女敧斜如醉仙端雅如賢士氣勢蔡雍云勢來不可止勢去不可遏惟筆軟則竒怪生焉蔡希綜云屈折之狀如鋼鐵為鈎牽掣之蹤若徑針直下主客勝負皆須姑息先作者主也後為者客也必舉止合則起伏相承訣云彩色字之神也神馭氣氣馭形形全骨肉肉全神色孫過庭云或恬淡雍容內含斤骨或折銼槎枿外耀鋒芒坡仙云吾醉後輒作草書十數行覺酒氣拂拂從十指間出也布置訣云長短濶狹字之態度點畫斜曲字之映對先主後賓卑奉尊接審其疏密取其停勻空則補就孤則扶持以下承上以右應左以大包小以少附多蔡雍云落筆結字上皆覆下下皆承上使其形勢遞相映帶無使相背歐陽詢云不可頭輕尾重無令左短右長斜正如人上稱下載薑堯章云疏欲風神密欲蒼老如佳之四橫川之三直魚之四點畫之九畫須下筆徑淨疏密得均當疏不疏反成寒乞當密不密必致凋疏書法三昧云如中字孤單則居中龍字相並則分左右為二停衝字則分左右中為三停雲字則分上下為二停素字則分上下中為三停凡四方八面點畫皆拱中心左短者齊上右短者齊下重畫上仰下覆重捺上留下放重字上小下大左促右展纂要云位置大停又唐人經生之弊絶無位置終不成書運用三昧云一點一畫之間三過其筆一點微如粟米亦分二過一字有一字之起止朝揖顧盼一行有一行之首尾接下承上郭若虛云氣韻本乎運心神采生於用筆夫畫有三病一曰版者腕弱筆癡全虧取與物狀平褊不能圓混也二曰刻者運筆中疑心手相度鉤畫之際妄生圭角也三曰結者欲行不行當散不散似物凝滯不能流暢也東坡云大字難於結密而無間小字難於寬綽而有餘真書難於飄揚草書難於嚴重又云作字要手熟則神氣完實而有餘韻書指云書貴質不貴工貴淡不貴豔貴自然不貴作意質非鄙俗之謂也清廟明堂大雅斯在是已淡非浮易之謂也太羮玄酒至味存焉是已自然非信手放意之謂也不事追琢神氣渾全險易同塗繁簡一致是已肥瘠衛夫人云善筆力者多骨不善筆力者多肉多骨微肉者謂之斤書多肉微骨者謂之墨豬梁武帝云純骨無媚純肉無力少墨浮澀多墨笨鈍虞永興云側管則鈍慢多肉直鋒則乾枯露骨比其悟也粗而不鈍細而能壯長而不為有餘短而不為不足歐陽詢云不可瘦瘦則形枯不可肥肥則質濁張懷瓘云馬以斤多肉少為上肉多斤少為下書亦如之必骨肉相稱神貌洽然若斤骨不任其脂肉在馬為駑駘在人為肉疾在書為墨豬準其病狀未即已也惟題署及八分肥密可也徐浩云斤骨不立脂肉何附筆須藏鋒不然有病鷹隼乏彩翰飛戾天骨徑而氣猛也翬翟備色翩翩百步肉豐而力沉也華彩髙翔則書之鳳凰矣黃魯直云肥不露肉瘦不露骨訣云書以骨為體以主其內以肉為用以彰其外氣宜清色宜溫骨宜豐肉宜潤方圓崔子玉云觀其法象俯仰有儀方不中矩圓不中規抑左揚右望之若敧虞世南云字體質滯為目所視如水在方圓豈由乎水且筆妙喻水方圓喻字所視不同逺近則異變通異訣云方以圓成圓由方得舍方求圓則骨氣莫全舍圓求方則神氣不潤方不變謂之斗圓不變謂之環書之病也張懷瓘云欲方而有規圓不失矩亦猶人之指腕促則如指之拳賒則如腕之屈然須裹之以皮肉若露斤骨是乃病也薑夔云方圓者真草之體用真欲方草欲圓方者參之以圓圓者參之以方方圓曲直不可顯露直須涵泳一出自然真多用折草多用轉方長嚴肅為體圓轉輕健為用歐顏方正虞永勻圓遲速筆勢論云意在筆前字居心後未作之初結思成矣筆不欲急何也筆為將軍故須持重心不欲遲何也心為箭鋒遲則中物不入訣云能速而速謂之入神能速不速謂之賞會未能速而速謂之狂馳不當遲而遲謂之淹滯狂馳則形勢不全淹滯則骨肉重慢縱橫斜直不速而行不止而緩腕不停筆筆不離紙心不速而神氣短筆不遲而神色枯一遲一速剛柔相濟孫過庭云徑速者超逸之機遲留者賞會之致將反其速行臻令美之方專溺於遲終爽絶倫之妙能速不速所謂遲留因遲就遲詎名賞會非心間手敏難以兼通焉薑堯章云遲以取妍速以取徑必先能速而後能遲若不能速而專事遲則無神氣若專事速則多失勢徑軟隸訣云方徑古拙挑拔平硬國史補云草瘦硬易肥徑難工訣云剛縱其柔柔縱其剛筆勢論取形質快健手腕輕便八法訣云點欲堅如鐵勾欲力如銀點橫無力而不險勾短棘針而有力橫畫籍於豎躍躍則筆徑澀掠撇法在澀而徑意欲暢而婉啄用輕徑為勝去浮怯重滯磔䟐重鋒緩則勢肥須遒徑而遲澀之草訣挑法揭欲利按欲輕輕則骨徑重則質鈍故云形圓則潤勢疾則澀以緊而徑以險而峻圓則骨不重方則氣不潤遲取妍速取徑墨潤取妍燥取險毫徑有力圓則妍美側管鈍慢多肉直鋒乾枯露骨觀諸説而徑軟辨矣結搆雲空上勾以應下如鳥之視胸九見腕勾以應上須折鋒而起門月右勾應左半斜以鋭為精來東中勾應中隨縮鋒而微露長民左勾應右須盡躍其鋒黍委上下之撇點有隂陽之分不分則無上下相承術衝三排之直畫卓然中立而不倚其左右有拱揖之情疆三三排之橫畫截然中處而不乖其上下有仰覆之别其目四畫上下反其情二三但取順然無四點左右要成八字中帶可就上不可就下皿四直左右上開下合炎茶兩捺一上捺一下捺不宜顛倒反及二撇先長而斜硬後差短而腕轉廬多先腕轉而後斜硬口曰不可橫長下畫長承直末臣巨欲直左而右旁短直應之旬掬裏面字與勾齊方稱長馬短畫不可與長直畫相粘衣良捺應左勾須略平起一云勾宜另搭莫矢下畫宜長撇短不轉而點取下長短應之思志心在下者欲折右足右寬方稱一云猶嫌挺直均平頁貝右長直畫須作小棘刺中短畫不可相粘欲圓淨勻平而啄短出以點承長直畫還逺之繞裏字上大下小方稱雖難直畫微向左以避右邉之勢烏鳥屈腳之勢如角弓之張用周初撇首尾向外次弩首尾向右同國初直畫首尾向右平畫仰次直畫首尾向左箋森重勾在先縮鋒而後出鋒作躍以應捺亦同行作左短右長於佳右短左長自因左竪短右勾微長亦馬點之重併必屈伸以變換之否則如布碁三册畫之重併必屈伸仰覆向背變換之否則如布算㸑薑繁雜者必求古人佳樣不可擅寫邊爾太繁者宜減之倉食上面不可寫波上下直畫宜短點宜近上是足卜字居中下撇須橫而波磔終之又名三牽綰法心初點向裏橫戈斜平勾向內而收中點取髙勢欲粘第三點第三點須與勾髙不可下風兩邊悉宜圓名曰金剪刀柔下木字左右須齊直者日字不宜正對土字十橫畫挍長直畫宜短七橫畫挍長直畫轉而復回和偏少者伸點畫以就之氊偏礙者屈畫以避之井字孤單者展一畫以舒之棗字重併者促一畫以斂之畫字九畫須下筆徑淨疏密停勻照映辛字太疏補之作􅉝必古有佳樣乃可寫左畫短斜硬其撇右畫長腕轉其撇一字有一字之形勢要在結搆得宜此不過舉前人論議之槩其間錯綜變化惟會心者自得之未可執一論也弊病梁武帝云運筆斜則無芒角執筆寬則書緩弱點掣短則臃腫點掣長則離澌畫細則字橫畫粗則形慢拘則乏勢放又少則王右軍云腹不宜促腳不宜賖又不宜斜重不宜長單不宜小復不宜大不宜傷密密則似疴瘵纒身不宜傷疏疏則似溺水之禽不宜傷長長則似死蛇挂樹不宜傷短短則似壓死蝦蟆孫過庭云質直者徑挺不通剛狠者倔強無潤矜斂者弊於拘束脫易者失於規矩溫柔者傷於軟緩躁勇者過於剽迫狐疑者溺於澀滯遲重者終於蹇鈍輕瑣者染於俗吏此皆獨行之士偏玩所乖張懷瓘云方圓齊平支體肥鈍布置逼仄稜角相形神氣昏蒙以濃墨為華書之病也虞安吉云太緩無斤太急無骨歐陽詢云最不可忙忙則失勢次不可緩緩則骨癡韋誕云多力豐斤者聖無力無斤者病書法有十戒一蠢俗二力弱三柔細四嫵媚五讓右六板律七狹長八葳𬎼九向背不得宜十上下不聯屬是也蠢俗則不大雅力弱則不遒徑柔細則不卓練嫵媚則不蒼古讓右則套落庸劣板律則氣運不動狹長則勢不冠冕葳𬎼則不揚眉吐氣向背不宜則結體無情上下不聯屬則神不流貫凡此十者犯一不可言書書法離鈎卷四
